<!doctype html>
<html>
<head><meta charset="UTF-8" /></head>
<body>
<template>
<style>
@import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;800&display=swap");
#root { position:absolute; inset:0; width:{{width}}px; height:{{height}}px; background:{{bg}}; color:{{fg}}; overflow:hidden; font-family:'Space Grotesk','Inter',sans-serif; }
#main-clip.vertical   { --pad:84px;  --title-size:76px; --store-label:32px; --item-size:36px; --cap-size:58px; --cap-bottom:170px; --cap-maxw:100%; }
#main-clip.horizontal { --pad:130px; --title-size:70px; --store-label:30px; --item-size:33px; --cap-size:44px; --cap-bottom:70px;  --cap-maxw:1180px; }

.bg-fill { pointer-events:none; position:absolute; inset:0; background:{{bg}}; }
.bg-grid { pointer-events:none; position:absolute; inset:-140px; opacity:.9;
  background-image:radial-gradient(rgba(230,237,243,.08) 2px, transparent 2px);
  background-size:54px 54px; }

.title { position:absolute; z-index:2; left:var(--pad); right:var(--pad); font-weight:700; font-size:var(--title-size); line-height:1.05; letter-spacing:-1px; }
#main-clip.vertical .title   { top:250px; text-align:center; }
#main-clip.horizontal .title { top:120px; text-align:left; }

.agent-badge { position:absolute; z-index:3; left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:16px; background:#161B22; border:2px solid {{accent}}; border-radius:999px; padding:16px 34px; font-family:'JetBrains Mono',monospace; font-weight:700; font-size:30px; box-shadow:0 0 40px {{accent}}33; }
#main-clip.vertical .agent-badge   { top:410px; }
#main-clip.horizontal .agent-badge { top:252px; }
.badge-ring { position:absolute; inset:-3px; border-radius:999px; border:3px solid {{accent}}; opacity:0; }

.stores { position:absolute; z-index:2; left:var(--pad); right:var(--pad); display:flex; gap:44px; }
#main-clip.vertical .stores   { top:560px; flex-direction:column; }
#main-clip.horizontal .stores { top:400px; flex-direction:row; }

.store { flex:1 1 0; background:#161B22; border:2px solid rgba(230,237,243,.14); border-radius:28px; padding:36px 42px; box-shadow:0 20px 60px rgba(0,0,0,.45); }
.store-label { font-family:'JetBrains Mono',monospace; font-weight:700; font-size:var(--store-label); letter-spacing:3px; margin-bottom:10px; }
.store.short .store-label { color:{{accent}}; }
.store.long  .store-label { color:#A78BFA; }
.store-sub { font-family:'JetBrains Mono',monospace; font-size:24px; opacity:.5; margin-bottom:26px; }
.mem-item { position:relative; display:flex; align-items:center; gap:20px; background:rgba(230,237,243,.05); border:1px solid rgba(230,237,243,.1); border-radius:16px; padding:20px 76px 20px 28px; margin-bottom:18px; font-family:'JetBrains Mono',monospace; font-size:var(--item-size); line-height:1.35; }
.mem-glyph { flex:0 0 auto; opacity:.8; }
.mem-ring { position:absolute; inset:-2px; border-radius:17px; border:3px solid {{accent}}; opacity:0; }
.store.long .mem-ring { border-color:#A78BFA; }
.recall-tag { position:absolute; right:18px; top:50%; margin-top:-16px; font-size:24px; opacity:0; }

.caption-zone { position:absolute; bottom:var(--cap-bottom); left:0; right:0; display:flex; align-items:center; justify-content:center; z-index:5; }
.caption { position:relative; width:calc(100% - 2*var(--pad)); max-width:var(--cap-maxw); height:2.4em; font-size:var(--cap-size); }
.cap-chunk { position:absolute; width:100%; left:0; top:50%; transform:translateY(-50%); font-family:'Inter',sans-serif; font-weight:800; text-align:center; line-height:1.3; opacity:0; }
.cap-chunk .cw { display:inline-block; white-space:pre; }
.hl { padding:0 .12em; border-radius:10px; background:{{accent}}; color:{{bg}}; }
</style>

<div id="root" data-composition-id="{{id}}" data-width="{{width}}" data-height="{{height}}" data-duration="{{duration}}" data-start="0">
  <section id="main-clip" class="clip main-clip {{orientation}}" data-start="0" data-duration="{{duration}}" data-track-index="1">
    <div class="bg-fill"></div>
    <div class="bg-grid"></div>
    <div class="title">{{title}}</div>
    <div class="agent-badge"><div class="badge-ring"></div><span>🤖</span><span>agent</span></div>
    <span class="sl-src" hidden>{{shortLabel}}</span>
    <span class="ll-src" hidden>{{longLabel}}</span>
    <div class="stores">
      <div class="store short"><div class="store-label"></div><div class="store-sub">this conversation</div><div class="items"></div></div>
      <div class="store long"><div class="store-label"></div><div class="store-sub">remembered across sessions</div><div class="items"></div></div>
    </div>
    <div class="caption-zone"><div class="caption"></div></div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script>
window.__timelines = window.__timelines || {};
(function(){
  var root = document.getElementById('root');
  var DUR = parseFloat('{{duration}}') || 4;
  var VERT = '{{orientation}}' === 'vertical';
  function $(s){ return root.querySelector(s); }
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
  function hl(t){ return esc(t).replace(/\*\*(.+?)\*\*/g,'<span class="hl">$1<\/span>'); }

  var titleEl = $('.title');
  var tt = titleEl.textContent.trim();
  if (!tt) titleEl.style.display = 'none'; else titleEl.innerHTML = hl(tt);

  $('.store.short .store-label').textContent = $('.sl-src').textContent.trim() || 'SHORT-TERM';
  $('.store.long .store-label').textContent  = $('.ll-src').textContent.trim() || 'LONG-TERM';

  var SHORT = {{shortItems}};
  var LONG = {{longItems}};
  function fill(sel, items, glyph){
    var host = $(sel + ' .items');
    return items.map(function(txt){
      var el = document.createElement('div');
      el.className = 'mem-item';
      el.innerHTML = '<div class="mem-ring"></div><span class="mem-glyph">' + glyph + '<\/span><span>' + hl(txt) + '<\/span><span class="recall-tag">→ 🤖<\/span>';
      host.appendChild(el);
      return el;
    });
  }
  var shortEls = fill('.store.short', SHORT, '💬');
  var longEls  = fill('.store.long',  LONG,  '📌');

  // Defensive fit: stores taller than the zone scale down to clear the
  // caption band (content limits live in schema.json; this is the net).
  (function(){
    var zone = $('.stores'); if (!zone || !zone.children.length) return;
    function apply(){
      gsap.set(zone, { clearProps:'transform' }); // re-measure from natural layout
      var rootR = root.getBoundingClientRect();
      var k = (rootR.width / parseFloat('{{width}}')) || 1;
      var r = zone.getBoundingClientRect();
      var top = (r.top - rootR.top) / k, h = r.height / k;
      var avail = (VERT ? 1580 : 890) - top;
      if (h > avail && avail > 0) gsap.set(zone, { scale: Math.max(0.6, avail / h), transformOrigin: '50% 0' });
    }
    apply(); // pre-font metrics can under-measure wraps — re-run when fonts land
    if (document.fonts) {
      document.fonts.ready.then(function(){ apply(); });
      if (document.fonts.addEventListener) document.fonts.addEventListener('loadingdone', function(){ apply(); });
    }
  })();

  var tl = gsap.timeline({ paused:true });
  tl.to($('.bg-grid'), { x:36, y:36, duration:DUR, ease:'none' }, 0);
  tl.fromTo(titleEl, { opacity:0, y:-24 }, { opacity:1, y:0, duration:0.32, ease:'power3.out' }, 0.08);
  tl.fromTo($('.agent-badge'), { opacity:0, scale:0.7 }, { opacity:1, scale:1, duration:0.32, ease:'back.out(1.8)' }, 0.18);

  // Stores slide in from opposite sides, then items file into each stack
  tl.fromTo($('.store.short'),
    VERT ? { opacity:0, y:-60 } : { opacity:0, x:-100 },
    VERT ? { opacity:1, y:0, duration:0.38, ease:'power3.out' } : { opacity:1, x:0, duration:0.38, ease:'power3.out' }, 0.3);
  tl.fromTo($('.store.long'),
    VERT ? { opacity:0, y:60 } : { opacity:0, x:100 },
    VERT ? { opacity:1, y:0, duration:0.38, ease:'power3.out' } : { opacity:1, x:0, duration:0.38, ease:'power3.out' }, 0.3);
  var all = shortEls.concat(longEls);
  var span = Math.min(DUR * 0.3, Math.max(0.8, all.length * 0.22));
  var per = span / Math.max(1, all.length);
  shortEls.forEach(function(el, i){
    tl.fromTo(el, { opacity:0, x:-40 }, { opacity:1, x:0, duration:0.26, ease:'power2.out' }, 0.6 + i * per * 2);
  });
  longEls.forEach(function(el, i){
    tl.fromTo(el, { opacity:0, x:40 }, { opacity:1, x:0, duration:0.26, ease:'power2.out' }, 0.6 + per + i * per * 2);
  });

  // Recall beat: one item per store lights up and points back to the agent
  var recallAt = 0.6 + span + 0.4;
  [shortEls[0], longEls[0]].forEach(function(el, i){
    if (!el) return;
    var at = recallAt + i * 0.35;
    tl.fromTo(el.querySelector('.mem-ring'), { opacity:0 }, { opacity:1, duration:0.25, ease:'power2.out' }, at);
    tl.fromTo(el.querySelector('.recall-tag'), { opacity:0, x:14 }, { opacity:0.9, x:0, duration:0.25, ease:'power2.out' }, at + 0.1);
    tl.fromTo(el, { scale:1 }, { scale:1.02, duration:0.12, ease:'power2.out' }, at);
    tl.to(el, { scale:1, duration:0.18, ease:'power2.inOut' }, at + 0.12);
  });
  // B-roll: agent badge pulses — it "has" the memories now
  var idleAt = recallAt + 0.9;
  var pulses = Math.max(1, Math.floor((DUR - idleAt) / 0.9));
  tl.fromTo($('.badge-ring'), { opacity:0 }, { opacity:0.8, duration:0.45, ease:'sine.inOut', repeat:pulses * 2 - 1, yoyo:true }, idleAt);

  var CT = {{captionTiming}};
  var capHost = $('.caption');
  var caps = (Array.isArray(CT) ? CT : []).map(function(c){
    var d = document.createElement('div');
    d.className = 'cap-chunk';
    var ws = Array.isArray(c.words) ? c.words : [];
    d.innerHTML = ws.length
      ? ws.map(function(w){ return '<span class="cw">' + hl(w.text) + ' </span>'; }).join('')
      : hl(c.text);
    capHost.appendChild(d);
    return d;
  });
  caps.forEach(function(el, i){
    var t = CT[i]; if(!t) return;
    if(i < caps.length - 1){
      var nextStart = CT[i+1] ? CT[i+1].start : t.end;
      var gap = Math.max(0.02, nextStart - t.start);
      var fadeOutDur = Math.min(0.12, gap);
      var fadeInDur = Math.min(i===0?0.2:0.18, Math.max(0.01, gap - fadeOutDur));
      tl.to(el, { opacity:1, duration:fadeInDur }, t.start);
      tl.to(el, { opacity:0, duration:fadeOutDur }, nextStart - fadeOutDur);
    } else {
      tl.to(el, { opacity:1, duration:i===0?0.2:0.18 }, t.start);
    }
    // Karaoke: only the word being spoken holds the highlight color; every
    // other word keeps the normal caption color. Emphasis pills (.hl) opt out.
    var ws = Array.isArray(t.words) ? t.words : [];
    var spans = el.querySelectorAll('.cw');
    ws.forEach(function(w, wi){
      var span = spans[wi]; if(!span || span.querySelector('.hl')) return;
      tl.to(span, { color:'{{capHighlight}}', duration:0.12, ease:'power2.out' }, w.start);
      tl.to(span, { color:'{{fg}}', duration:0.15 }, Math.max(w.start + 0.12, w.end));
    });
  });

  window.__timelines['{{id}}'] = tl;
})();
</script>
</template>
</body>
</html>
