<!doctype html>
<html>
<head><meta charset="UTF-8" /></head>
<body>
<template>
<style>
@import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;800&display=swap");
#root { position:absolute; inset:0; width:{{width}}px; height:{{height}}px; background:{{bg}}; color:{{fg}}; overflow:hidden; font-family:'Space Grotesk','Inter',sans-serif; }
#main-clip.vertical   { --pad:84px;  --headline-size:120px; --sub-size:52px; --pill-size:44px; --cap-size:58px; --cap-bottom:200px; --cap-maxw:100%; }
#main-clip.horizontal { --pad:130px; --headline-size:104px; --sub-size:46px; --pill-size:40px; --cap-size:44px; --cap-bottom:80px;  --cap-maxw:1180px; }

.bg-fill { pointer-events:none; position:absolute; inset:0; background:{{bg}}; }
.bg-grid { pointer-events:none; position:absolute; inset:-140px; opacity:.9;
  background-image:radial-gradient(rgba(230,237,243,.08) 2px, transparent 2px);
  background-size:54px 54px; }
.bg-glow { pointer-events:none; position:absolute; inset:0; opacity:0;
  background:radial-gradient(ellipse 70% 50% at 50% 45%, {{accent}}22, transparent 70%); }

.hero { position:absolute; z-index:2; left:var(--pad); right:var(--pad); text-align:center; display:flex; flex-direction:column; align-items:center; }
#main-clip.vertical .hero   { top:620px; gap:44px; }
#main-clip.horizontal .hero { top:280px; gap:38px; }

.headline { font-weight:700; font-size:var(--headline-size); line-height:1.04; letter-spacing:-1px; }
.subheadline { font-family:'Inter',sans-serif; font-weight:700; font-size:var(--sub-size); line-height:1.3; opacity:.85; max-width:16em; }
.pill { display:flex; align-items:center; gap:20px; margin-top:26px; font-family:'JetBrains Mono',monospace; font-weight:700; font-size:var(--pill-size); letter-spacing:2px; color:{{bg}}; background:{{accent}}; border-radius:999px; padding:30px 58px; }
.pill-glow { position:absolute; inset:-18px; border-radius:999px; border:3px solid {{accent}}; opacity:0; }
.pill-wrap { position:relative; }
.cursor { display:inline-block; width:.5em; height:.9em; background:{{bg}}; border-radius:4px; }

.caption-zone { position:absolute; bottom:var(--cap-bottom); left:0; right:0; display:flex; align-items:center; justify-content:center; z-index:5; }
.caption { position:relative; width:calc(100% - 2*var(--pad)); max-width:var(--cap-maxw); height:2.4em; font-size:var(--cap-size); }
.cap-chunk { position:absolute; width:100%; left:0; top:50%; transform:translateY(-50%); font-family:'Inter',sans-serif; font-weight:800; text-align:center; line-height:1.3; opacity:0; }
.cap-chunk .cw { display:inline-block; white-space:pre; }
.hl { padding:0 .12em; border-radius:10px; background:{{accent}}; color:{{bg}}; }
</style>

<div id="root" data-composition-id="{{id}}" data-width="{{width}}" data-height="{{height}}" data-duration="{{duration}}" data-start="0">
  <section id="main-clip" class="clip main-clip {{orientation}}" data-start="0" data-duration="{{duration}}" data-track-index="1">
    <div class="bg-fill"></div>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>
    <div class="hero">
      <div class="headline">{{headline}}</div>
      <div class="subheadline">{{subheadline}}</div>
      <span class="pill-src" hidden>{{eyebrow}}</span>
      <div class="pill-wrap">
        <div class="pill-glow"></div>
        <div class="pill"><span class="pill-txt">FOLLOW FOR MORE</span><span class="cursor"></span></div>
      </div>
    </div>
    <div class="caption-zone"><div class="caption"></div></div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script>
window.__timelines = window.__timelines || {};
(function(){
  var root = document.getElementById('root');
  var DUR = parseFloat('{{duration}}') || 4;
  function $(s){ return root.querySelector(s); }
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
  function hl(t){ return esc(t).replace(/\*\*(.+?)\*\*/g,'<span class="hl">$1<\/span>'); }

  ['.headline','.subheadline'].forEach(function(sel){
    var el = $(sel); if(!el) return;
    var t = el.textContent.trim();
    if(!t){ el.style.display = 'none'; return; }
    el.innerHTML = hl(t);
  });
  // Use the eyebrow as the pill label when provided (e.g. a handle/channel name)
  var eyebrowTxt = $('.pill-src').textContent.trim(); // via hidden DOM node — apostrophe-safe
  if (eyebrowTxt) $('.pill-txt').textContent = eyebrowTxt;

  var tl = gsap.timeline({ paused:true });

  tl.to($('.bg-grid'), { x:36, y:36, duration:DUR, ease:'none' }, 0);
  tl.to($('.bg-glow'), { opacity:1, duration:0.7, ease:'power2.out' }, 0);
  tl.fromTo($('.headline'), { opacity:0, scale:1.16 }, { opacity:1, scale:1, duration:0.38, ease:'back.out(1.7)' }, 0.12);
  tl.fromTo($('.subheadline'), { opacity:0, y:26 }, { opacity:0.85, y:0, duration:0.32, ease:'power2.out' }, 0.4);
  tl.fromTo($('.pill-wrap'), { opacity:0, scale:0.7 }, { opacity:1, scale:1, duration:0.4, ease:'back.out(2)' }, 0.65);

  // B-roll: pill glow ring pulses + cursor blinks for the rest of the scene
  var pulses = Math.max(1, Math.floor((DUR - 1.1) / 0.9));
  tl.fromTo($('.pill-glow'), { opacity:0, scale:0.92 }, { opacity:0.8, scale:1.06, duration:0.45, ease:'sine.inOut', repeat:pulses * 2 - 1, yoyo:true }, 1.1);
  var blinks = Math.max(1, Math.ceil((DUR - 1.1) / 0.42));
  tl.fromTo($('.cursor'), { opacity:1 }, { opacity:0, duration:0.21, ease:'none', repeat:blinks * 2 - 1, yoyo:true }, 1.1);

  var CT = {{captionTiming}};
  var capHost = $('.caption');
  var caps = (Array.isArray(CT) ? CT : []).map(function(c){
    var d = document.createElement('div');
    d.className = 'cap-chunk';
    var ws = Array.isArray(c.words) ? c.words : [];
    d.innerHTML = ws.length
      ? ws.map(function(w){ return '<span class="cw">' + hl(w.text) + ' </span>'; }).join('')
      : hl(c.text);
    capHost.appendChild(d);
    return d;
  });
  caps.forEach(function(el, i){
    var t = CT[i]; if(!t) return;
    tl.to(el, { opacity:1, duration:i===0?0.2:0.18 }, t.start);
    if(i < caps.length - 1){
      var nextStart = CT[i+1] ? CT[i+1].start : t.end;
      tl.to(el, { opacity:0, duration:0.12 }, Math.max(t.start, nextStart - 0.12));
    }
    // Karaoke: only the word being spoken holds the highlight color; every
    // other word keeps the normal caption color. Emphasis pills (.hl) opt out.
    var ws = Array.isArray(t.words) ? t.words : [];
    var spans = el.querySelectorAll('.cw');
    ws.forEach(function(w, wi){
      var span = spans[wi]; if(!span || span.querySelector('.hl')) return;
      tl.to(span, { color:'{{capHighlight}}', duration:0.12, ease:'power2.out' }, w.start);
      tl.to(span, { color:'{{fg}}', duration:0.15 }, Math.max(w.start + 0.12, w.end));
    });
  });

  window.__timelines['{{id}}'] = tl;
})();
</script>
</template>
</body>
</html>
