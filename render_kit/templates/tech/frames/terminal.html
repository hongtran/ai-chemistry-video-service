<!doctype html>
<html>
<head><meta charset="UTF-8" /></head>
<body>
<template>
<style>
@import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;800&display=swap");
#root { position:absolute; inset:0; width:{{width}}px; height:{{height}}px; background:{{bg}}; color:{{fg}}; overflow:hidden; font-family:'Space Grotesk','Inter',sans-serif; }
#main-clip.vertical   { --pad:70px;  --head-size:76px; --term-size:38px; --win-top:520px; --cap-size:58px; --cap-bottom:190px; --cap-maxw:100%; }
#main-clip.horizontal { --pad:130px; --head-size:70px; --term-size:38px; --win-top:300px; --cap-size:44px; --cap-bottom:75px;  --cap-maxw:1180px; }

.bg-fill { pointer-events:none; position:absolute; inset:0; background:{{bg}}; }
.bg-grid { pointer-events:none; position:absolute; inset:-140px; opacity:.9;
  background-image:radial-gradient(rgba(230,237,243,.08) 2px, transparent 2px);
  background-size:54px 54px; }

.headline { position:absolute; z-index:2; left:var(--pad); right:var(--pad); font-weight:700; font-size:var(--head-size); line-height:1.05; letter-spacing:-1px; }
#main-clip.vertical .headline   { top:280px; text-align:center; }
#main-clip.horizontal .headline { top:130px; text-align:left; }

.window { position:absolute; z-index:2; top:var(--win-top); background:#0A0E14; border:1px solid rgba(230,237,243,.14); border-radius:26px; overflow:hidden; box-shadow:0 30px 80px rgba(0,0,0,.5); }
#main-clip.vertical .window   { left:var(--pad); right:var(--pad); }
#main-clip.horizontal .window { left:50%; width:1320px; margin-left:-660px; }
.win-bar { display:flex; align-items:center; gap:14px; padding:26px 34px; background:rgba(230,237,243,.045); border-bottom:1px solid rgba(230,237,243,.09); }
.dot { width:22px; height:22px; border-radius:50%; }
.dot-r{background:#FF5F57}.dot-y{background:#FEBC2E}.dot-g{background:#28C840}
.win-title { margin-left:16px; font-family:'JetBrains Mono',monospace; font-size:27px; opacity:.6; }
.term-body { padding:44px 44px 50px; font-family:'JetBrains Mono',monospace; font-size:var(--term-size); line-height:1.8; }
.cmd-line { white-space:pre-wrap; word-break:break-all; }
.prompt { color:{{accent}}; font-weight:700; }
.typed {}
.cursor { display:inline-block; width:.55em; height:1.05em; vertical-align:-.15em; background:{{accent}}; border-radius:4px; margin-left:2px; }
.out-line { white-space:pre-wrap; word-break:break-all; opacity:.78; }
.out-line.ok { color:#4ADE80; opacity:1; font-weight:700; }

.caption-zone { position:absolute; bottom:var(--cap-bottom); left:0; right:0; display:flex; align-items:center; justify-content:center; z-index:5; }
.caption { position:relative; width:calc(100% - 2*var(--pad)); max-width:var(--cap-maxw); height:2.4em; font-size:var(--cap-size); }
.cap-chunk { position:absolute; width:100%; left:0; top:50%; transform:translateY(-50%); font-family:'Inter',sans-serif; font-weight:800; text-align:center; line-height:1.3; opacity:0; }
.cap-chunk .cw { display:inline-block; white-space:pre; }
.hl { padding:0 .12em; border-radius:10px; background:{{accent}}; color:{{bg}}; }
</style>

<div id="root" data-composition-id="{{id}}" data-width="{{width}}" data-height="{{height}}" data-duration="{{duration}}" data-start="0">
  <section id="main-clip" class="clip main-clip {{orientation}}" data-start="0" data-duration="{{duration}}" data-track-index="1">
    <div class="bg-fill"></div>
    <div class="bg-grid"></div>
    <div class="headline">{{headline}}</div>
    <div class="window">
      <div class="win-bar"><span class="dot dot-r"></span><span class="dot dot-y"></span><span class="dot dot-g"></span><span class="win-title">zsh — {{eyebrow}}</span></div>
      <div class="term-body"></div>
    </div>
    <div class="caption-zone"><div class="caption"></div></div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script>
window.__timelines = window.__timelines || {};
(function(){
  var root = document.getElementById('root');
  var DUR = parseFloat('{{duration}}') || 4;
  function $(s){ return root.querySelector(s); }
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
  function hl(t){ return esc(t).replace(/\*\*(.+?)\*\*/g,'<span class="hl">$1<\/span>'); }

  var headEl = $('.headline');
  var ht = headEl.textContent.trim();
  if (!ht) headEl.style.display = 'none'; else headEl.innerHTML = hl(ht);

  var COMMANDS = {{commands}};
  var body = $('.term-body');
  var cursor = document.createElement('span');
  cursor.className = 'cursor';

  // Build DOM up front (deterministic): one .cmd-line + .out-line per entry.
  // A leading "✓ " on an output line styles it as the success row.
  var entries = COMMANDS.map(function(c){
    var cmdLine = document.createElement('div');
    cmdLine.className = 'cmd-line';
    cmdLine.innerHTML = '<span class="prompt">❯ <\/span><span class="typed"><\/span>';
    body.appendChild(cmdLine);
    var outEls = (c.output || []).map(function(o){
      var d = document.createElement('div');
      d.className = 'out-line' + (o.indexOf('✓') === 0 ? ' ok' : '');
      d.textContent = o;
      body.appendChild(d);
      return d;
    });
    return { cmd:String(c.cmd), typedEl:cmdLine.querySelector('.typed'), cmdLine:cmdLine, outEls:outEls };
  });

  // Defensive fit: a window taller than its zone scales down to clear the
  // caption band (content limits live in schema.json; this is the net).
  // The entrance tween animates .window's own scale, which would overwrite a
  // fit set directly on it — so the fit scales a wrapper element instead.
  (function(){
    var win = $('.window'); if (!win) return;
    var fitWrap = document.createElement('div');
    fitWrap.style.cssText = 'position:absolute; inset:0; z-index:2;';
    win.parentNode.insertBefore(fitWrap, win);
    fitWrap.appendChild(win);
    function apply(){
      gsap.set(fitWrap, { clearProps:'transform' }); // re-measure from natural layout
      var rootR = root.getBoundingClientRect();
      var k = (rootR.width / parseFloat('{{width}}')) || 1;
      var r = win.getBoundingClientRect();
      var top = (r.top - rootR.top) / k, h = r.height / k;
      var avail = (('{{orientation}}' === 'vertical') ? 1580 : 890) - top;
      if (h > avail && avail > 0) gsap.set(fitWrap, { scale: Math.max(0.6, avail / h), transformOrigin: '50% ' + top + 'px' });
    }
    apply(); // pre-font metrics can under-measure wraps — re-run when fonts land
    if (document.fonts) {
      document.fonts.ready.then(function(){ apply(); });
      if (document.fonts.addEventListener) document.fonts.addEventListener('loadingdone', function(){ apply(); });
    }
  })();

  var tl = gsap.timeline({ paused:true });
  tl.to($('.bg-grid'), { x:36, y:36, duration:DUR, ease:'none' }, 0);
  tl.fromTo(headEl, { opacity:0, y:-24 }, { opacity:1, y:0, duration:0.32, ease:'power3.out' }, 0.08);
  tl.fromTo($('.window'), { opacity:0, y:70, scale:0.96 }, { opacity:1, y:0, scale:1, duration:0.45, ease:'power3.out' }, 0.15);

  // Budget the type/print schedule to ~70% of the scene, compressing if needed
  var natural = 0;
  entries.forEach(function(e){
    natural += Math.min(1.1, Math.max(0.5, e.cmd.length * 0.045)) + 0.25 + e.outEls.length * 0.18 + 0.3;
  });
  var budget = DUR * 0.7 - 0.5;
  var k = natural > budget ? budget / natural : 1;

  var t = 0.55;
  entries.forEach(function(e){
    var typeDur = Math.min(1.1, Math.max(0.5, e.cmd.length * 0.045)) * k;
    // Character-by-character typing driven by the timeline (seek-safe)
    tl.fromTo(e.cmdLine, { opacity:0 }, { opacity:1, duration:0.08 }, t);
    var proxy = { n: 0 }, cmd = e.cmd, typedEl = e.typedEl;
    tl.to(proxy, { n: cmd.length, duration: typeDur, ease:'none',
      onUpdate: function(){ typedEl.textContent = cmd.slice(0, Math.round(proxy.n)); } }, t);
    t += typeDur + 0.25 * k;
    e.outEls.forEach(function(o){
      tl.fromTo(o, { opacity:0, y:10 }, { opacity:1, y:0, duration:0.16, ease:'power2.out' }, t);
      t += 0.18 * k;
    });
    t += 0.3 * k;
  });

  // Cursor parks on the last command line and blinks out the scene
  if (entries.length) {
    entries[entries.length - 1].cmdLine.appendChild(cursor);
    var blinks = Math.max(1, Math.ceil((DUR - t) / 0.42));
    tl.fromTo(cursor, { opacity:1 }, { opacity:0, duration:0.21, ease:'none', repeat:blinks * 2 - 1, yoyo:true }, t);
  }

  var CT = {{captionTiming}};
  var capHost = $('.caption');
  var caps = (Array.isArray(CT) ? CT : []).map(function(c){
    var d = document.createElement('div');
    d.className = 'cap-chunk';
    var ws = Array.isArray(c.words) ? c.words : [];
    d.innerHTML = ws.length
      ? ws.map(function(w){ return '<span class="cw">' + hl(w.text) + ' </span>'; }).join('')
      : hl(c.text);
    capHost.appendChild(d);
    return d;
  });
  caps.forEach(function(el, i){
    var tt = CT[i]; if(!tt) return;
    if(i < caps.length - 1){
      var nextStart = CT[i+1] ? CT[i+1].start : tt.end;
      var gap = Math.max(0.02, nextStart - tt.start);
      var fadeOutDur = Math.min(0.12, gap);
      var fadeInDur = Math.min(i===0?0.2:0.18, Math.max(0.01, gap - fadeOutDur));
      tl.to(el, { opacity:1, duration:fadeInDur }, tt.start);
      tl.to(el, { opacity:0, duration:fadeOutDur }, nextStart - fadeOutDur);
    } else {
      tl.to(el, { opacity:1, duration:i===0?0.2:0.18 }, tt.start);
    }
    // Karaoke: only the word being spoken holds the highlight color; every
    // other word keeps the normal caption color. Emphasis pills (.hl) opt out.
    var ws = Array.isArray(tt.words) ? tt.words : [];
    var spans = el.querySelectorAll('.cw');
    ws.forEach(function(w, wi){
      var span = spans[wi]; if(!span || span.querySelector('.hl')) return;
      tl.to(span, { color:'{{capHighlight}}', duration:0.12, ease:'power2.out' }, w.start);
      tl.to(span, { color:'{{fg}}', duration:0.15 }, Math.max(w.start + 0.12, w.end));
    });
  });

  window.__timelines['{{id}}'] = tl;
})();
</script>
</template>
</body>
</html>
