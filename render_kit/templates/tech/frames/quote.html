<!doctype html>
<html>
<head><meta charset="UTF-8" /></head>
<body>
<template>
<style>
@import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;800&display=swap");
#root { position:absolute; inset:0; width:{{width}}px; height:{{height}}px; background:{{bg}}; color:{{fg}}; overflow:hidden; font-family:'Space Grotesk','Inter',sans-serif; }
#main-clip.vertical   { --pad:96px;  --quote-size:76px; --slash-size:200px; --attr-size:38px; --cap-size:58px; --cap-bottom:220px; --cap-maxw:100%; }
#main-clip.horizontal { --pad:150px; --quote-size:68px; --slash-size:230px; --attr-size:36px; --cap-size:44px; --cap-bottom:90px;  --cap-maxw:1180px; }

.bg-fill { pointer-events:none; position:absolute; inset:0; background:{{bg}}; }
.bg-grid { pointer-events:none; position:absolute; inset:-140px; opacity:.9;
  background-image:radial-gradient(rgba(230,237,243,.08) 2px, transparent 2px);
  background-size:54px 54px; }
.bg-glow { pointer-events:none; position:absolute; inset:0; opacity:0;
  background:radial-gradient(ellipse 65% 45% at 42% 40%, {{accent}}1E, transparent 70%); }

.hero { position:absolute; z-index:2; }
#main-clip.vertical .hero   { left:var(--pad); right:var(--pad); top:520px; }
#main-clip.horizontal .hero { left:var(--pad); right:var(--pad); top:250px; display:flex; gap:70px; align-items:flex-start; }

.slashes { font-family:'JetBrains Mono',monospace; font-weight:700; font-size:var(--slash-size); line-height:.8; color:{{accent}}; letter-spacing:-.06em; }
#main-clip.vertical .slashes { margin-bottom:40px; }
#main-clip.horizontal .slashes { flex:0 0 auto; margin-top:-10px; }
.quote { font-weight:500; font-size:var(--quote-size); line-height:1.32; letter-spacing:-.5px; }
.quote .w { display:inline-block; white-space:pre; }
.attribution { font-family:'JetBrains Mono',monospace; font-size:var(--attr-size); font-weight:400; color:{{fg}}; opacity:.62; margin-top:52px; }

.caption-zone { position:absolute; bottom:var(--cap-bottom); left:0; right:0; display:flex; align-items:center; justify-content:center; z-index:5; }
.caption { position:relative; width:calc(100% - 2*var(--pad)); max-width:var(--cap-maxw); height:2.4em; font-size:var(--cap-size); }
.cap-chunk { position:absolute; width:100%; left:0; top:50%; transform:translateY(-50%); font-family:'Inter',sans-serif; font-weight:800; text-align:center; line-height:1.3; opacity:0; }
.cap-chunk .cw { display:inline-block; white-space:pre; }
.hl { padding:0 .12em; border-radius:10px; background:{{accent}}; color:{{bg}}; }
</style>

<div id="root" data-composition-id="{{id}}" data-width="{{width}}" data-height="{{height}}" data-duration="{{duration}}" data-start="0">
  <section id="main-clip" class="clip main-clip {{orientation}}" data-start="0" data-duration="{{duration}}" data-track-index="1">
    <div class="bg-fill"></div>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>
    <div class="hero">
      <div class="slashes">//</div>
      <div class="quote-block">
        <div class="quote" style="font-size:{{quoteFontSize}}">{{quote}}</div>
        <div class="attribution">— {{attribution}}</div>
      </div>
    </div>
    <div class="caption-zone"><div class="caption"></div></div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script>
window.__timelines = window.__timelines || {};
(function(){
  var root = document.getElementById('root');
  var DUR = parseFloat('{{duration}}') || 4;
  function $(s){ return root.querySelector(s); }
  function $all(s){ return Array.prototype.slice.call(root.querySelectorAll(s)); }
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
  function hl(t){ return esc(t).replace(/\*\*(.+?)\*\*/g,'<span class="hl">$1<\/span>'); }
  // Multi-word **spans** must survive word-splitting: re-mark each word
  function splitMarks(t){ return String(t).replace(/\*\*(.+?)\*\*/g, function(_m, inner){
    return inner.split(/\s+/).map(function(w){ return '**' + w + '**'; }).join(' ');
  }); }

  // Split the quote into word spans (accent-highlight aware) for stagger reveal
  var quoteEl = $('.quote');
  var raw = splitMarks(quoteEl.textContent.trim());
  quoteEl.innerHTML = raw.split(/\s+/).map(function(w){
    return '<span class="w">' + hl(w) + ' </span>';
  }).join('');

  var attrEl = $('.attribution');
  if (!attrEl.textContent.replace('—','').trim()) attrEl.style.display = 'none';

  var tl = gsap.timeline({ paused:true });

  tl.to($('.bg-grid'), { x:36, y:36, duration:DUR, ease:'none' }, 0);
  tl.to($('.bg-glow'), { opacity:1, duration:0.8, ease:'power2.out' }, 0);
  tl.fromTo($('.slashes'), { opacity:0, x:-40 }, { opacity:1, x:0, duration:0.35, ease:'power3.out' }, 0.1);

  var words = $all('.quote .w');
  var revealSpan = Math.min(1.6, DUR * 0.45);
  var per = words.length > 1 ? revealSpan / words.length : revealSpan;
  words.forEach(function(w, i){
    tl.fromTo(w, { opacity:0, y:22 }, { opacity:1, y:0, duration:0.3, ease:'power2.out' }, 0.3 + i * per);
  });
  tl.fromTo(attrEl, { opacity:0, y:16 }, { opacity:0.62, y:0, duration:0.3, ease:'power2.out' }, 0.3 + revealSpan + 0.15);

  // B-roll: slashes pulse gently for the remainder of the scene
  var pulseStart = 0.3 + revealSpan + 0.5;
  var pulses = Math.max(1, Math.floor((DUR - pulseStart) / 0.9));
  tl.to($('.slashes'), { scale:1.04, duration:0.45, ease:'sine.inOut', repeat:pulses * 2 - 1, yoyo:true, transformOrigin:'left bottom' }, pulseStart);

  var CT = {{captionTiming}};
  var capHost = $('.caption');
  var caps = (Array.isArray(CT) ? CT : []).map(function(c){
    var d = document.createElement('div');
    d.className = 'cap-chunk';
    var ws = Array.isArray(c.words) ? c.words : [];
    d.innerHTML = ws.length
      ? ws.map(function(w){ return '<span class="cw">' + hl(w.text) + ' </span>'; }).join('')
      : hl(c.text);
    capHost.appendChild(d);
    return d;
  });
  caps.forEach(function(el, i){
    var t = CT[i]; if(!t) return;
    if(i < caps.length - 1){
      var nextStart = CT[i+1] ? CT[i+1].start : t.end;
      var gap = Math.max(0.02, nextStart - t.start);
      var fadeOutDur = Math.min(0.12, gap);
      var fadeInDur = Math.min(i===0?0.2:0.18, Math.max(0.01, gap - fadeOutDur));
      tl.to(el, { opacity:1, duration:fadeInDur }, t.start);
      tl.to(el, { opacity:0, duration:fadeOutDur }, nextStart - fadeOutDur);
    } else {
      tl.to(el, { opacity:1, duration:i===0?0.2:0.18 }, t.start);
    }
    // Karaoke: only the word being spoken holds the highlight color; every
    // other word keeps the normal caption color. Emphasis pills (.hl) opt out.
    var ws = Array.isArray(t.words) ? t.words : [];
    var spans = el.querySelectorAll('.cw');
    ws.forEach(function(w, wi){
      var span = spans[wi]; if(!span || span.querySelector('.hl')) return;
      tl.to(span, { color:'{{capHighlight}}', duration:0.12, ease:'power2.out' }, w.start);
      tl.to(span, { color:'{{fg}}', duration:0.15 }, Math.max(w.start + 0.12, w.end));
    });
  });

  window.__timelines['{{id}}'] = tl;
})();
</script>
</template>
</body>
</html>
