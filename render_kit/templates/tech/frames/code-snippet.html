<!doctype html>
<html>
<head><meta charset="UTF-8" /></head>
<body>
<template>
<style>
@import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;800&display=swap");
#root { position:absolute; inset:0; width:{{width}}px; height:{{height}}px; background:{{bg}}; color:{{fg}}; overflow:hidden; font-family:'Space Grotesk','Inter',sans-serif; }
#main-clip.vertical   { --pad:70px;  --head-size:76px; --code-size:38px; --win-top:520px; --cap-size:58px; --cap-bottom:190px; --cap-maxw:100%; }
#main-clip.horizontal { --pad:130px; --head-size:70px; --code-size:36px; --win-top:300px; --cap-size:44px; --cap-bottom:75px;  --cap-maxw:1180px; }

.bg-fill { pointer-events:none; position:absolute; inset:0; background:{{bg}}; }
.bg-grid { pointer-events:none; position:absolute; inset:-140px; opacity:.9;
  background-image:radial-gradient(rgba(230,237,243,.08) 2px, transparent 2px);
  background-size:54px 54px; }

.headline { position:absolute; z-index:2; left:var(--pad); right:var(--pad); font-weight:700; font-size:var(--head-size); line-height:1.05; letter-spacing:-1px; }
#main-clip.vertical .headline   { top:280px; text-align:center; }
#main-clip.horizontal .headline { top:130px; text-align:left; }

.window { position:absolute; z-index:2; top:var(--win-top); background:#161B22; border:1px solid rgba(230,237,243,.14); border-radius:26px; overflow:hidden; box-shadow:0 30px 80px rgba(0,0,0,.5); }
#main-clip.vertical .window   { left:var(--pad); right:var(--pad); }
#main-clip.horizontal .window { left:50%; width:1320px; margin-left:-660px; }
.win-bar { display:flex; align-items:center; gap:14px; padding:26px 34px; background:rgba(230,237,243,.045); border-bottom:1px solid rgba(230,237,243,.09); }
.dot { width:22px; height:22px; border-radius:50%; }
.dot-r{background:#FF5F57}.dot-y{background:#FEBC2E}.dot-g{background:#28C840}
.win-title { margin-left:16px; font-family:'JetBrains Mono',monospace; font-size:27px; opacity:.6; }
.code { padding:44px 40px; font-family:'JetBrains Mono',monospace; font-size:var(--code-size); line-height:1.75; }
.code-line { position:relative; display:flex; white-space:pre; }
.ln { width:2.2em; flex:0 0 auto; opacity:.32; text-align:right; padding-right:1.3em; user-select:none; }
.line-bar { position:absolute; left:-40px; right:-40px; top:0; bottom:0; background:{{accent}}1C; border-left:8px solid {{accent}}; transform-origin:left center; }
.tok-k { color:#A78BFA; font-weight:700; }
.tok-s { color:#4ADE80; }
.tok-c { color:#8B949E; font-style:italic; }
.tok-n { color:#FFB224; }
.tok-f { color:{{accent}}; }

.caption-zone { position:absolute; bottom:var(--cap-bottom); left:0; right:0; display:flex; align-items:center; justify-content:center; z-index:5; }
.caption { position:relative; width:calc(100% - 2*var(--pad)); max-width:var(--cap-maxw); height:2.4em; font-size:var(--cap-size); }
.cap-chunk { position:absolute; width:100%; left:0; top:50%; transform:translateY(-50%); font-family:'Inter',sans-serif; font-weight:800; text-align:center; line-height:1.3; opacity:0; }
.cap-chunk .cw { display:inline-block; white-space:pre; }
.hl { padding:0 .12em; border-radius:10px; background:{{accent}}; color:{{bg}}; }
</style>

<div id="root" data-composition-id="{{id}}" data-width="{{width}}" data-height="{{height}}" data-duration="{{duration}}" data-start="0">
  <section id="main-clip" class="clip main-clip {{orientation}}" data-start="0" data-duration="{{duration}}" data-track-index="1">
    <div class="bg-fill"></div>
    <div class="bg-grid"></div>
    <div class="headline">{{headline}}</div>
    <div class="window">
      <div class="win-bar"><span class="dot dot-r"></span><span class="dot dot-y"></span><span class="dot dot-g"></span><span class="win-title">{{filename}}</span></div>
      <div class="code"></div>
    </div>
    <div class="caption-zone"><div class="caption"></div></div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script>
window.__timelines = window.__timelines || {};
(function(){
  var root = document.getElementById('root');
  var DUR = parseFloat('{{duration}}') || 4;
  function $(s){ return root.querySelector(s); }
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
  function hl(t){ return esc(t).replace(/\*\*(.+?)\*\*/g,'<span class="hl">$1<\/span>'); }

  var headEl = $('.headline');
  var ht = headEl.textContent.trim();
  if (!ht) headEl.style.display = 'none'; else headEl.innerHTML = hl(ht);

  // Lightweight deterministic syntax highlighter (comments, strings,
  // keywords, numbers, calls) — a visual approximation, not a real parser.
  var KW = ['def','return','import','from','class','if','elif','else','for','while','in','not','and','or','with','as','lambda','pass','raise','yield','try','except','finally','print','const','let','var','function','await','async','export','default','new','catch','throw','typeof','interface','type','extends','implements','echo','fi','then','do','done','True','False','None','true','false','null','undefined'];
  var TOKEN_RE = new RegExp(
    '(#.*$|\\/\\/.*$)' +                                   // 1 comment
    '|("(?:[^"\\\\]|\\\\.)*"|\'(?:[^\'\\\\]|\\\\.)*\'|`(?:[^`\\\\]|\\\\.)*`)' + // 2 string
    '|\\b(' + KW.join('|') + ')\\b' +                       // 3 keyword
    '|\\b(\\d+(?:\\.\\d+)?)\\b' +                           // 4 number
    '|([A-Za-z_][A-Za-z0-9_]*)(?=\\()',                     // 5 call
  'gm');
  function highlightCode(line){
    return esc(line).replace(TOKEN_RE, function(m, c, s, k, n, f){
      if (c) return '<span class="tok-c">' + c + '<\/span>';
      if (s) return '<span class="tok-s">' + s + '<\/span>';
      if (k) return '<span class="tok-k">' + k + '<\/span>';
      if (n) return '<span class="tok-n">' + n + '<\/span>';
      if (f) return '<span class="tok-f">' + f + '<\/span>';
      return m;
    });
  }

  var CODE = {{code}};
  var HL_LINES = {{highlightLines}};
  var codeHost = $('.code');
  // Fit the mono font to the longest line so nothing overflows the window:
  // line advance ≈ 0.61em/char + 3.6em number gutter, inside the usable width.
  var W = {{width}};
  var VERT = '{{orientation}}' === 'vertical';
  var maxChars = CODE.reduce(function(m, l){ return Math.max(m, l.length); }, 1);
  var usable = (VERT ? W - 2 * 70 : 1320) - 80; // window width minus .code padding
  var baseFs = VERT ? 38 : 36;
  var fs = Math.min(baseFs, Math.floor(usable / (0.61 * maxChars + 3.6)));
  codeHost.style.fontSize = fs + 'px';
  var lineEls = CODE.map(function(line, i){
    var d = document.createElement('div');
    d.className = 'code-line';
    d.innerHTML = '<span class="ln">' + (i + 1) + '<\/span><span class="src">' + (highlightCode(line) || '&nbsp;') + '<\/span>';
    codeHost.appendChild(d);
    return d;
  });
  // Highlight bars sit behind the flagged lines, swept in after the reveal
  var bars = (Array.isArray(HL_LINES) ? HL_LINES : []).map(function(n){
    var line = lineEls[n - 1];
    if (!line) return null;
    var bar = document.createElement('div');
    bar.className = 'line-bar';
    line.insertBefore(bar, line.firstChild);
    return bar;
  }).filter(Boolean);

  // Defensive fit: a window taller than its zone scales down to clear the
  // caption band (content limits live in schema.json; this is the net).
  // The entrance tween animates .window's own scale, which would overwrite a
  // fit set directly on it — so the fit scales a wrapper element instead.
  (function(){
    var win = $('.window'); if (!win) return;
    var fitWrap = document.createElement('div');
    fitWrap.style.cssText = 'position:absolute; inset:0; z-index:2;';
    win.parentNode.insertBefore(fitWrap, win);
    fitWrap.appendChild(win);
    function apply(){
      gsap.set(fitWrap, { clearProps:'transform' }); // re-measure from natural layout
      var rootR = root.getBoundingClientRect();
      var k = (rootR.width / W) || 1;
      var r = win.getBoundingClientRect();
      var top = (r.top - rootR.top) / k, h = r.height / k;
      var avail = (VERT ? 1580 : 890) - top;
      if (h > avail && avail > 0) gsap.set(fitWrap, { scale: Math.max(0.6, avail / h), transformOrigin: '50% ' + top + 'px' });
    }
    apply(); // pre-font metrics can under-measure wraps — re-run when fonts land
    if (document.fonts) {
      document.fonts.ready.then(function(){ apply(); });
      if (document.fonts.addEventListener) document.fonts.addEventListener('loadingdone', function(){ apply(); });
    }
  })();

  var tl = gsap.timeline({ paused:true });

  tl.to($('.bg-grid'), { x:36, y:36, duration:DUR, ease:'none' }, 0);
  tl.fromTo(headEl, { opacity:0, y:-24 }, { opacity:1, y:0, duration:0.32, ease:'power3.out' }, 0.08);
  tl.fromTo($('.window'), { opacity:0, y:70, scale:0.96 }, { opacity:1, y:0, scale:1, duration:0.45, ease:'power3.out' }, 0.2);

  // Lines reveal one by one, like the file is being written
  var span = Math.min(DUR * 0.45, Math.max(1.0, lineEls.length * 0.22));
  var per = lineEls.length > 1 ? span / lineEls.length : span;
  lineEls.forEach(function(line, i){
    tl.fromTo(line, { opacity:0, x:-26 }, { opacity:1, x:0, duration:0.24, ease:'power2.out' }, 0.55 + i * per);
  });

  // The "look here" beat: accent bar sweeps onto the key lines
  var sweepAt = 0.55 + span + 0.25;
  bars.forEach(function(bar, i){
    tl.fromTo(bar, { opacity:0, scaleX:0 }, { opacity:1, scaleX:1, duration:0.35, ease:'power3.out' }, sweepAt + i * 0.15);
  });
  // B-roll: window drifts up a touch for the rest of the scene
  tl.to($('.window'), { y:-14, duration:Math.max(0.5, DUR - sweepAt - 0.4), ease:'sine.inOut' }, sweepAt + 0.3);

  var CT = {{captionTiming}};
  var capHost = $('.caption');
  var caps = (Array.isArray(CT) ? CT : []).map(function(c){
    var d = document.createElement('div');
    d.className = 'cap-chunk';
    var ws = Array.isArray(c.words) ? c.words : [];
    d.innerHTML = ws.length
      ? ws.map(function(w){ return '<span class="cw">' + hl(w.text) + ' </span>'; }).join('')
      : hl(c.text);
    capHost.appendChild(d);
    return d;
  });
  caps.forEach(function(el, i){
    var t = CT[i]; if(!t) return;
    tl.to(el, { opacity:1, duration:i===0?0.2:0.18 }, t.start);
    if(i < caps.length - 1){
      var nextStart = CT[i+1] ? CT[i+1].start : t.end;
      tl.to(el, { opacity:0, duration:0.12 }, Math.max(t.start, nextStart - 0.12));
    }
    // Karaoke: only the word being spoken holds the highlight color; every
    // other word keeps the normal caption color. Emphasis pills (.hl) opt out.
    var ws = Array.isArray(t.words) ? t.words : [];
    var spans = el.querySelectorAll('.cw');
    ws.forEach(function(w, wi){
      var span = spans[wi]; if(!span || span.querySelector('.hl')) return;
      tl.to(span, { color:'{{capHighlight}}', duration:0.12, ease:'power2.out' }, w.start);
      tl.to(span, { color:'{{fg}}', duration:0.15 }, Math.max(w.start + 0.12, w.end));
    });
  });

  window.__timelines['{{id}}'] = tl;
})();
</script>
</template>
</body>
</html>
