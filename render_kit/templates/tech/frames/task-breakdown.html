<!doctype html>
<html>
<head><meta charset="UTF-8" /></head>
<body>
<template>
<style>
@import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;800&display=swap");
#root { position:absolute; inset:0; width:{{width}}px; height:{{height}}px; background:{{bg}}; color:{{fg}}; overflow:hidden; font-family:'Space Grotesk','Inter',sans-serif; }
#main-clip.vertical   { --pad:84px;  --title-size:76px; --goal-size:64px; --task-size:46px; --sub-size:27px; --cap-size:58px; --cap-bottom:170px; --cap-maxw:100%; }
#main-clip.horizontal { --pad:130px; --title-size:70px; --goal-size:56px; --task-size:40px; --sub-size:25px; --cap-size:44px; --cap-bottom:70px;  --cap-maxw:1180px; }

.bg-fill { pointer-events:none; position:absolute; inset:0; background:{{bg}}; }
.bg-grid { pointer-events:none; position:absolute; inset:-140px; opacity:.9;
  background-image:radial-gradient(rgba(230,237,243,.08) 2px, transparent 2px);
  background-size:54px 54px; }

.title { position:absolute; z-index:2; left:var(--pad); right:var(--pad); font-weight:700; font-size:var(--title-size); line-height:1.05; letter-spacing:-1px; }
#main-clip.vertical .title   { top:250px; text-align:center; }
#main-clip.horizontal .title { top:120px; text-align:left; }

.hero { position:absolute; z-index:2; left:var(--pad); right:var(--pad); display:flex; align-items:center; }
#main-clip.vertical .hero   { top:430px; flex-direction:column; }
#main-clip.horizontal .hero { top:300px; height:560px; flex-direction:row; justify-content:center; gap:0; }

.goal-card { position:relative; background:#161B22; border:2px solid {{accent}}66; border-radius:28px; padding:44px 56px; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,.45); }
#main-clip.vertical .goal-card   { width:min(780px, 100%); }
#main-clip.horizontal .goal-card { flex:0 0 520px; }
.goal-ring { position:absolute; inset:-3px; border-radius:30px; border:3px solid {{accent}}; opacity:0; }
.goal-tag { font-family:'JetBrains Mono',monospace; font-weight:700; font-size:26px; letter-spacing:4px; color:{{accent}}; margin-bottom:18px; }
.goal-txt { font-weight:700; font-size:var(--goal-size); line-height:1.12; }

.stem { flex:0 0 auto; background:{{accent}}; border-radius:5px; }
#main-clip.vertical .stem   { width:10px; height:64px; }
#main-clip.horizontal .stem { height:10px; width:80px; }

.checklist { display:flex; flex-direction:column; gap:26px; }
#main-clip.vertical .checklist   { width:100%; }
#main-clip.horizontal .checklist { flex:0 1 760px; }
.task { display:flex; align-items:center; gap:30px; background:rgba(230,237,243,.045); border:1px solid rgba(230,237,243,.09); border-radius:20px; padding:26px 36px; }
.box { position:relative; flex:0 0 auto; width:52px; height:52px; border-radius:14px; border:4px solid rgba(230,237,243,.3); }
.tick { position:absolute; inset:-4px; border-radius:14px; background:{{accent}}; color:{{bg}}; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:34px; }
.task-label { font-family:'Inter',sans-serif; font-weight:700; font-size:var(--task-size); line-height:1.2; }
.task-sub { font-family:'JetBrains Mono',monospace; font-size:var(--sub-size); opacity:.55; margin-top:6px; }

.caption-zone { position:absolute; bottom:var(--cap-bottom); left:0; right:0; display:flex; align-items:center; justify-content:center; z-index:5; }
.caption { position:relative; width:calc(100% - 2*var(--pad)); max-width:var(--cap-maxw); height:2.4em; font-size:var(--cap-size); }
.cap-chunk { position:absolute; width:100%; left:0; top:50%; transform:translateY(-50%); font-family:'Inter',sans-serif; font-weight:800; text-align:center; line-height:1.3; opacity:0; }
.cap-chunk .cw { display:inline-block; white-space:pre; }
.hl { padding:0 .12em; border-radius:10px; background:{{accent}}; color:{{bg}}; }
</style>

<div id="root" data-composition-id="{{id}}" data-width="{{width}}" data-height="{{height}}" data-duration="{{duration}}" data-start="0">
  <section id="main-clip" class="clip main-clip {{orientation}}" data-start="0" data-duration="{{duration}}" data-track-index="1">
    <div class="bg-fill"></div>
    <div class="bg-grid"></div>
    <div class="title">{{title}}</div>
    <div class="hero">
      <div class="goal-card">
        <div class="goal-ring"></div>
        <div class="goal-tag">GOAL</div>
        <div class="goal-txt">{{goal}}</div>
      </div>
      <div class="stem"></div>
      <div class="checklist"></div>
    </div>
    <div class="caption-zone"><div class="caption"></div></div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script>
window.__timelines = window.__timelines || {};
(function(){
  var root = document.getElementById('root');
  var DUR = parseFloat('{{duration}}') || 4;
  var VERT = '{{orientation}}' === 'vertical';
  function $(s){ return root.querySelector(s); }
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
  function hl(t){ return esc(t).replace(/\*\*(.+?)\*\*/g,'<span class="hl">$1<\/span>'); }

  ['.title','.goal-txt'].forEach(function(sel){
    var el = $(sel); if(!el) return;
    var t = el.textContent.trim();
    if(!t){ el.style.display = 'none'; return; }
    el.innerHTML = hl(t);
  });

  var SUBTASKS = {{subtasks}};
  var list = $('.checklist');
  var tasks = SUBTASKS.map(function(s){
    var el = document.createElement('div');
    el.className = 'task';
    el.innerHTML = '<div class="box"><div class="tick">✓<\/div><\/div>' +
      '<div><div class="task-label">' + hl(s.label || '') + '<\/div>' +
      (s.sublabel ? '<div class="task-sub">' + esc(s.sublabel) + '<\/div>' : '') + '<\/div>';
    list.appendChild(el);
    return { el:el, tick:el.querySelector('.tick') };
  });

  // Defensive fit: the hero (goal card + checklist) scales down when its
  // children extend past the caption band (horizontal centers content in a
  // fixed box, so measure the children union, not the box).
  (function(){
    var zone = $('.hero'); if (!zone || !zone.children.length) return;
    function apply(){
      gsap.set(zone, { clearProps:'transform' }); // re-measure from natural layout
      var rootR = root.getBoundingClientRect();
      var k = (rootR.width / parseFloat('{{width}}')) || 1;
      var r = zone.getBoundingClientRect();
      var bottom = -Infinity;
      for (var i = 0; i < zone.children.length; i++) {
        var kr = zone.children[i].getBoundingClientRect();
        if (kr.height > 1) bottom = Math.max(bottom, kr.bottom);
      }
      if (!isFinite(bottom)) return;
      var top = (r.top - rootR.top) / k, needed = (bottom - rootR.top) / k - top;
      var avail = (VERT ? 1580 : 890) - top;
      if (needed > avail && avail > 0) gsap.set(zone, { scale: Math.max(0.6, avail / needed), transformOrigin: '50% 0' });
    }
    apply(); // pre-font metrics can under-measure wraps — re-run when fonts land
    if (document.fonts) {
      document.fonts.ready.then(function(){ apply(); });
      if (document.fonts.addEventListener) document.fonts.addEventListener('loadingdone', function(){ apply(); });
    }
  })();

  var tl = gsap.timeline({ paused:true });
  tl.to($('.bg-grid'), { x:36, y:36, duration:DUR, ease:'none' }, 0);
  tl.fromTo($('.title'), { opacity:0, y:-24 }, { opacity:1, y:0, duration:0.32, ease:'power3.out' }, 0.08);

  // Goal lands, the stem drops, the checklist unrolls (first row lands
  // early so the scene never sits fully empty at the first inspect sample)
  tl.fromTo($('.goal-card'), { opacity:0, scale:0.8 }, { opacity:1, scale:1, duration:0.38, ease:'back.out(1.7)' }, 0.12);
  tl.fromTo($('.stem'),
    VERT ? { scaleY:0, transformOrigin:'center top' } : { scaleX:0, transformOrigin:'left center' },
    VERT ? { scaleY:1, duration:0.22, ease:'power2.out' } : { scaleX:1, duration:0.22, ease:'power2.out' }, 0.26);
  var inSpan = Math.min(DUR * 0.3, Math.max(0.8, tasks.length * 0.28));
  var perIn = inSpan / Math.max(1, tasks.length);
  tasks.forEach(function(t, i){
    tl.fromTo(t.el, { opacity:0, x:VERT ? -60 : 60 }, { opacity:1, x:0, duration:0.3, ease:'power3.out' }, 0.28 + i * perIn);
  });

  // The payoff: boxes tick themselves one by one
  var tickAt = 0.28 + inSpan + 0.3;
  var tickSpan = Math.min(DUR * 0.35, Math.max(0.9, tasks.length * 0.35));
  var perTick = tickSpan / Math.max(1, tasks.length);
  tasks.forEach(function(t, i){
    var at = tickAt + i * perTick;
    tl.fromTo(t.tick, { opacity:0, scale:0.2 }, { opacity:1, scale:1, duration:0.26, ease:'back.out(2.4)' }, at);
    tl.fromTo(t.el, { scale:1 }, { scale:1.02, duration:0.1, ease:'power2.out' }, at);
    tl.to(t.el, { scale:1, duration:0.15, ease:'power2.inOut' }, at + 0.1);
  });

  // B-roll: goal ring pulses once everything is done
  var idleAt = tickAt + tickSpan + 0.3;
  var pulses = Math.max(1, Math.floor((DUR - idleAt) / 0.9));
  tl.fromTo($('.goal-ring'), { opacity:0 }, { opacity:0.8, duration:0.45, ease:'sine.inOut', repeat:pulses * 2 - 1, yoyo:true }, idleAt);

  var CT = {{captionTiming}};
  var capHost = $('.caption');
  var caps = (Array.isArray(CT) ? CT : []).map(function(c){
    var d = document.createElement('div');
    d.className = 'cap-chunk';
    var ws = Array.isArray(c.words) ? c.words : [];
    d.innerHTML = ws.length
      ? ws.map(function(w){ return '<span class="cw">' + hl(w.text) + ' </span>'; }).join('')
      : hl(c.text);
    capHost.appendChild(d);
    return d;
  });
  caps.forEach(function(el, i){
    var t = CT[i]; if(!t) return;
    tl.to(el, { opacity:1, duration:i===0?0.2:0.18 }, t.start);
    if(i < caps.length - 1){
      var nextStart = CT[i+1] ? CT[i+1].start : t.end;
      tl.to(el, { opacity:0, duration:0.12 }, Math.max(t.start, nextStart - 0.12));
    }
    // Karaoke: only the word being spoken holds the highlight color; every
    // other word keeps the normal caption color. Emphasis pills (.hl) opt out.
    var ws = Array.isArray(t.words) ? t.words : [];
    var spans = el.querySelectorAll('.cw');
    ws.forEach(function(w, wi){
      var span = spans[wi]; if(!span || span.querySelector('.hl')) return;
      tl.to(span, { color:'{{capHighlight}}', duration:0.12, ease:'power2.out' }, w.start);
      tl.to(span, { color:'{{fg}}', duration:0.15 }, Math.max(w.start + 0.12, w.end));
    });
  });

  window.__timelines['{{id}}'] = tl;
})();
</script>
</template>
</body>
</html>
