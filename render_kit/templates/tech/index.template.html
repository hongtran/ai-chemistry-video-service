<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width={{width}}, height={{height}}" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: {{width}}px;
        height: {{height}}px;
        overflow: hidden;
        background: #000;
      }
      #root {
        position: relative;
        width: {{width}}px;
        height: {{height}}px;
        overflow: hidden;
        background: #000;
      }
      .clip {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="{{totalDuration}}"
      data-width="{{width}}"
      data-height="{{height}}"
    >
      <!-- SCENES_PLACEHOLDER -->

      <!-- AUDIO_PLACEHOLDER -->
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["main"] = gsap.timeline({ paused: true });
      (function () {
        var tl = window.__timelines["main"];
        // TRANSITIONS_PLACEHOLDER
        tl.to({}, { duration: {{totalDuration}} }, 0);
      })();
    </script>
  </body>
</html>
