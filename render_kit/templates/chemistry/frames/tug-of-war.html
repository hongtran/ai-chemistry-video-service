<!doctype html>
<html>
<head><meta charset="UTF-8" /></head>
<body>
<template>
<style>
@import url("https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700;800;900&display=swap");
#root { position:absolute; inset:0; width:{{width}}px; height:{{height}}px; background:{{bg}}; color:{{fg}}; overflow:hidden; }
#eyebrow { position:absolute; top:120px; left:0; right:0; text-align:center; font-family:'Inter',sans-serif; font-size:34px; font-weight:800; letter-spacing:6px; text-transform:uppercase; opacity:.85; }
#hero { position:absolute; top:560px; left:0; right:0; height:360px; }
.atom { position:absolute; top:0; width:220px; height:220px; border-radius:50%; border:10px solid {{fg}}; display:flex; align-items:center; justify-content:center; font-family:'Anton',sans-serif; font-size:96px; z-index:2; }
#atom-l { left:120px; }
#atom-r { right:120px; }
#atom-l { background:{{leftColor}}; }
#atom-r { background:{{rightColor}}; }
.atom span { color:{{bg}}; }
#bond { position:absolute; top:100px; left:340px; right:340px; height:14px; background:{{fg}}; border-radius:8px; opacity:.5; }
.e { position:absolute; top:90px; width:40px; height:40px; border-radius:50%; background:{{accent}}; z-index:1; }
.charge { position:absolute; top:-70px; font-family:'Anton',sans-serif; font-size:90px; opacity:0; }
#charge-l { left:200px; } #charge-r { right:200px; }
#verb { position:absolute; top:1010px; left:0; right:0; text-align:center; font-family:'Anton',sans-serif; font-size:120px; text-transform:uppercase; opacity:0; }
#headline { position:absolute; top:1200px; left:0; right:0; text-align:center; padding:0 80px; font-family:'Anton',sans-serif; font-size:88px; line-height:1; text-transform:uppercase; }
#caption-zone { position:absolute; bottom:230px; left:0; right:0; padding:0 90px; display:flex; align-items:center; justify-content:center; }
#caption { position:relative; width:100%; height:2.4em; }
.hl { padding:0 .14em; border-radius:10px; background:{{accent}}; color:{{bg}}; }

/* Karaoke caption chunk (built by hfBuildCaptions; one .cw span per word) */
.cap-chunk { position:absolute; width:100%; left:0; top:50%; transform:translateY(-50%); font-family:'Inter',sans-serif; font-weight:900; text-align:center; line-height:1.25; font-size:var(--cap-size,66px); opacity:0; }
.cap-chunk .cw { display:inline-block; white-space:pre; }

#main-clip.vertical   { --cap-size:66px; }
#main-clip.horizontal { --cap-size:44px; }
#main-clip.horizontal #caption-zone { bottom:60px; padding:0 160px; }
#main-clip.horizontal #caption { max-width:1360px; margin:0 auto; }

#main-clip.horizontal #eyebrow  { top:70px; }
#main-clip.horizontal #hero     { top:230px; left:50%; right:auto; width:1080px; transform:translateX(-50%); }
#main-clip.horizontal #verb     { top:620px; font-size:96px; }
#main-clip.horizontal #headline { top:770px; font-size:74px; }
</style>

<div id="root" data-composition-id="{{id}}" data-width="{{width}}" data-height="{{height}}" data-duration="{{duration}}" data-start="0">
  <section class="clip {{orientation}}" id="main-clip" data-start="0" data-duration="{{duration}}" data-track-index="1">
    <div id="eyebrow">{{eyebrow}}</div>
    <div id="hero">
      <div id="bond"></div>
      <div class="atom" id="atom-l"><span>{{leftSymbol}}</span><div class="charge" id="charge-l" data-layout-allow-overflow="true">+</div></div>
      <div class="atom" id="atom-r"><span>{{rightSymbol}}</span><div class="charge" id="charge-r" data-layout-allow-overflow="true">−</div></div>
    </div>
    <div id="verb"></div>
    <div id="headline">{{headline}}</div>
    <div id="caption-zone"><div id="caption"></div></div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script>
window.__timelines = window.__timelines || {};
function hfEsc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
function hfHighlight(t){ return hfEsc(t).replace(/\*\*(.+?)\*\*/g,'<span class="hl">$1<\/span>'); }
['eyebrow','headline'].forEach(function(id){ var el=document.getElementById(id); if(!el)return; var t=el.textContent.trim(); if(!t){el.style.display='none';return;} el.innerHTML=hfHighlight(t); });
function hfSplitMarks(t){ return String(t).replace(/\*\*(.+?)\*\*/g,function(_m,inner){ return inner.split(/\s+/).map(function(w){ return '**'+w+'**'; }).join(' '); }); }
function hfBuildCaptions(cv){ var arr=Array.isArray(cv)?cv:[]; var host=document.getElementById('caption'); return arr.map(function(c){ var d=document.createElement('div'); d.className='cap-chunk'; var ws=Array.isArray(c.words)?c.words:[]; d.innerHTML= ws.length ? ws.map(function(w){ return '<span class="cw">'+hfHighlight(w.text)+' </span>'; }).join('') : hfHighlight(hfSplitMarks(c.text)); host.appendChild(d); return d; }); }
function hfAnimateCaptions(tl,ch,timings){ ch.forEach(function(el,i){ var t=timings[i]; if(!t)return; tl.to(el,{opacity:1,duration:i===0?0.2:0.18},t.start); if(i<ch.length-1){ var nextStart=timings[i+1]?timings[i+1].start:t.end; tl.to(el,{opacity:0,duration:0.12},Math.max(t.start,nextStart-0.12)); }
  // Karaoke: only the word being spoken holds capHighlight; every other word
  // keeps the caption color. Emphasis pills (.hl) opt out.
  var ws=Array.isArray(t.words)?t.words:[]; var spans=el.querySelectorAll('.cw'); ws.forEach(function(w,wi){ var span=spans[wi]; if(!span||span.querySelector('.hl'))return; tl.to(span,{color:'{{capHighlight}}',duration:0.12,ease:'power2.out'},w.start); tl.to(span,{color:'{{fg}}',duration:0.15},Math.max(w.start+0.12,w.end)); }); }); }

var mode = '{{mode}}';
var nE = parseInt('{{electrons}}') || 2;
var verbEl = document.getElementById('verb');
var defaultVerb = (mode === 'unequal') ? 'TRANSFERRED' : 'SHARED';
verbEl.textContent = ('{{verb}}'.trim() || defaultVerb);

// Build electrons centered between atoms (hero center x = (1080)/2 = 540; bond spans 340..740).
var hero = document.getElementById('hero');
var centerX = 540, gap = 52;
var startX = centerX - ((nE - 1) * gap) / 2 - 20;
var es = [];
for (var i = 0; i < nE; i++){
  var e = document.createElement('div');
  e.className = 'e';
  e.style.left = (startX + i * gap) + 'px';
  hero.appendChild(e);
  es.push(e);
}

gsap.set('.atom', { scale:0, transformOrigin:'center' });
gsap.set('.e', { scale:0, opacity:0, transformOrigin:'center' });
gsap.set('#bond', { scaleX:0, transformOrigin:'center' });
gsap.set('#verb', { scale:0, transformOrigin:'center' });

var tl = gsap.timeline({ paused:true });
tl.to('.atom', { scale:1, duration:0.4, ease:'back.out(1.6)', stagger:0.1 }, 0.1);
tl.to('#bond', { scaleX:1, duration:0.4, ease:'power2.out' }, 0.3);
tl.to('.e', { scale:1, opacity:1, duration:0.3, ease:'back.out(2)', stagger:0.08 }, 0.5);

if (mode === 'unequal'){
  // Tension wobble, then snap electrons fully to the right atom; charges pop; atoms recoil.
  tl.to('.e', { x:-30, duration:0.25, yoyo:true, repeat:1, ease:'power1.inOut' }, 1.0);
  tl.to('.e', { x:300, duration:0.5, ease:'power3.in' }, 1.6);
  tl.to('#charge-l', { opacity:1, y:-6, duration:0.3, ease:'back.out(2)' }, 2.0);
  tl.to('#charge-r', { opacity:1, y:-6, duration:0.3, ease:'back.out(2)' }, 2.0);
  tl.to('#atom-l', { x:-40, duration:0.35, ease:'power2.out' }, 2.05);
  tl.to('#atom-r', { x:40, duration:0.35, ease:'power2.out' }, 2.05);
} else {
  // Equal pull: electrons oscillate around dead-center (never leave).
  tl.to('.e', { x:34, duration:0.6, yoyo:true, repeat:3, ease:'sine.inOut' }, 1.0);
}
tl.to('#verb', { opacity:1, scale:1, duration:0.3, ease:'back.out(2)' }, 2.4);

var captionTiming = {{captionTiming}};
var chunks = hfBuildCaptions(captionTiming);
hfAnimateCaptions(tl, chunks, captionTiming);

window.__timelines['{{id}}'] = tl;
</script>
</template>
</body>
</html>
