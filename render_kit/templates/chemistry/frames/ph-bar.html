<!doctype html>
<html>
<head><meta charset="UTF-8" /></head>
<body>
<template>
<style>
/* SB-1 */
@import url("https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700;800;900&display=swap");
#root { position:absolute; inset:0; width:{{width}}px; height:{{height}}px; background:{{bg}}; color:{{fg}}; overflow:hidden; }
#eyebrow { position:absolute; top:90px; left:0; right:0; text-align:center; font-family:'Inter',sans-serif; font-size:34px; font-weight:800; letter-spacing:6px; text-transform:uppercase; opacity:.85; }
#caption-zone { position:absolute; bottom:230px; left:0; right:0; padding:0 90px; display:flex; align-items:center; justify-content:center; }
#caption { position:relative; width:100%; height:2.4em; }
.hl { padding:0 .14em; border-radius:10px; background:{{accent}}; color:{{bg}}; }
/* ph-bar specific */
#ph-title { position:absolute; top:155px; left:0; right:0; text-align:center; font-family:'Inter',sans-serif; font-size:28px; font-weight:700; letter-spacing:4px; text-transform:uppercase; }
#hero { position:absolute; top:260px; left:0; right:0; height:760px; display:flex; align-items:center; justify-content:center; }
#scale-wrap { position:relative; display:flex; flex-direction:column; align-items:center; gap:14px; padding-top:220px; }
#dots-row { display:flex; flex-wrap:wrap; width:900px; gap:14px; justify-content:center; }
.ph-dot { width:150px; height:60px; border-radius:14px; flex-shrink:0; }
#numbers-row { display:flex; flex-wrap:wrap; width:900px; gap:14px; justify-content:center; }
.ph-num { width:150px; text-align:center; font-family:'Inter',sans-serif; font-weight:900; font-size:30px; }
#scale-labels { width:900px; display:flex; justify-content:space-between; padding:0 4px; }
.scale-label { font-family:'Inter',sans-serif; font-size:18px; font-weight:700; opacity:.7; letter-spacing:2px; text-transform:uppercase; }
#headline { position:absolute; top:1120px; left:0; right:0; text-align:center; padding:0 80px; font-family:'Anton',sans-serif; font-weight:400; font-size:130px; line-height:1; text-transform:uppercase; }
#magnifier { position:absolute; pointer-events:none; }
</style>

<div id="root" data-composition-id="{{id}}" data-width="{{width}}" data-height="{{height}}" data-duration="{{duration}}" data-start="0">
  <section class="clip" id="main-clip" data-start="0" data-duration="{{duration}}" data-track-index="1">
    <div id="eyebrow">{{eyebrow}}</div>
    <div id="ph-title">{{title}}</div>
    <div id="hero">
      <div id="scale-wrap">
        <div id="dots-row"></div>
        <div id="numbers-row"></div>
        <div id="scale-labels">
          <span class="scale-label">Acidic</span>
          <span class="scale-label">Alkaline</span>
        </div>
      </div>
    </div>
    <div id="headline">{{headline}}</div>
    <div id="caption-zone"><div id="caption"></div></div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script>
window.__timelines = window.__timelines || {};
// SB-2
function hfEsc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
function hfHighlight(t){ return hfEsc(t).replace(/\*\*(.+?)\*\*/g,'<span class="hl">$1<\/span>'); }
['eyebrow','headline'].forEach(function(id){ var el=document.getElementById(id); if(!el)return; var t=el.textContent.trim(); if(!t){el.style.display='none';return;} el.innerHTML=hfHighlight(t); });
function hfBuildCaptions(cv){ var arr=Array.isArray(cv)?cv:[]; var host=document.getElementById('caption'); return arr.map(function(c){ var d=document.createElement('div'); d.style.cssText='position:absolute;width:100%;left:0;top:50%;transform:translateY(-50%);font-family:Inter,sans-serif;font-size:66px;font-weight:900;text-align:center;line-height:1.25;opacity:0;'; d.innerHTML=hfHighlight(c.text); host.appendChild(d); return d; }); }
function hfAnimateCaptions(tl,ch,timings){ ch.forEach(function(el,i){ var t=timings[i]; if(!t)return; tl.to(el,{opacity:1,duration:i===0?0.2:0.18},t.start); if(i<ch.length-1){ var nextStart=timings[i+1]?timings[i+1].start:t.end; tl.to(el,{opacity:0,duration:0.12},Math.max(t.start,nextStart-0.12)); } }); }

var PH_COLORS = [
  '#C0392B','#D44E1A','#E07020','#E8A020','#D4C020',
  '#A0B830','#5FA840','#4A8A4A','#3A8878','#2A7898',
  '#2A58A8','#3A3898','#582888','#781878','#6B3FA0'
];

var targetPh = parseInt('{{targetPh}}');
var hasMagnifier = !isNaN(targetPh) && targetPh >= 0 && targetPh <= 14;
var dotsRow = document.getElementById('dots-row');
var numsRow = document.getElementById('numbers-row');

PH_COLORS.forEach(function(color, i) {
  var dot = document.createElement('div');
  dot.className = 'ph-dot'; dot.id = 'ph-dot-' + i; dot.style.background = color;
  dotsRow.appendChild(dot);
  var num = document.createElement('div');
  num.className = 'ph-num'; num.id = 'ph-num-' + i; num.textContent = i;
  numsRow.appendChild(num);
});

var phTitleEl = document.getElementById('ph-title');
if (phTitleEl && !phTitleEl.textContent.trim()) phTitleEl.style.display = 'none';

var MAG_W = 160, MAG_H = 200;
if (hasMagnifier) {
  var mag = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  mag.id = 'magnifier';
  mag.setAttribute('viewBox', '0 0 160 200');
  mag.setAttribute('width', String(MAG_W));
  mag.setAttribute('height', String(MAG_H));
  mag.style.cssText = 'position:absolute;opacity:0;pointer-events:none;';
  mag.innerHTML = '<circle cx="70" cy="70" r="62" fill="none" stroke="{{fg}}" stroke-width="10"/><line x1="114" y1="114" x2="148" y2="162" stroke="{{fg}}" stroke-width="10" stroke-linecap="round"/>';
  document.getElementById('scale-wrap').appendChild(mag);
}

gsap.set('#eyebrow',   { opacity:0, y:-12 });
gsap.set('#ph-title',  { opacity:0 });
gsap.set('.ph-dot',    { scale:0, opacity:0, transformOrigin:'center' });
gsap.set('.ph-num',    { opacity:0 });
gsap.set('#headline',  { opacity:0, scale:1.15, transformOrigin:'center top' });

var tl = gsap.timeline({ paused:true });
tl.to('#eyebrow',  { opacity:1, y:0,     duration:0.3 }, 0.05);
tl.to('#ph-title', { opacity:1,           duration:0.4 }, 0);
tl.to('.ph-dot',   { scale:1, opacity:1,  duration:0.3, ease:'back.out(1.2)', stagger:0.04 }, 0.2);
tl.to('.ph-num',   { opacity:1,           duration:0.2, stagger:0.04 }, 0.35);
tl.to('#headline', { opacity:1, scale:1,  duration:0.35, ease:'back.out(1.6)' }, 0.85);

if (hasMagnifier) {
  // Read target dot position relative to #scale-wrap (its nearest position:relative ancestor).
  var scaleWrap = document.getElementById('scale-wrap');
  var targetDot = document.getElementById('ph-dot-' + targetPh);
  var startDot  = document.getElementById('ph-dot-0');
  var dotW = targetDot.offsetWidth;   // 150px
  // Final position: center magnifier over target dot, hang above it
  var finalLeft = targetDot.offsetLeft + dotW / 2 - MAG_W / 2;
  var finalTop  = targetDot.offsetTop  - MAG_H - 10;
  // Start position: above pH-0 dot
  var initLeft  = startDot.offsetLeft  + startDot.offsetWidth / 2 - MAG_W / 2;
  var initTop   = startDot.offsetTop   - MAG_H - 10;
  gsap.set('#magnifier', { left:initLeft, top:initTop });
  // Whip to target then scale-pop on arrival
  tl.to('#magnifier', { opacity:1, duration:0.3 }, 0.9);
  tl.to('#magnifier', { left:finalLeft, top:finalTop, duration:0.5, ease:'power3.inOut' }, 1.0);
  tl.to('#magnifier', { scale:1.2, duration:0.1, ease:'power2.out' }, 1.5);
  tl.to('#magnifier', { scale:1.0, duration:0.15, ease:'back.out(2)' }, 1.6);
}

var captionTiming = {{captionTiming}};
var chunks = hfBuildCaptions(captionTiming);
hfAnimateCaptions(tl, chunks, captionTiming);

window.__timelines['{{id}}'] = tl;
</script>
</template>
</body>
</html>
