<!doctype html>
<html>
<head><meta charset="UTF-8" /></head>
<body>
<template>
<style>
/* SB-1 */
@import url("https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700;800;900&display=swap");
#root { position:absolute; inset:0; width:{{width}}px; height:{{height}}px; background:{{bg}}; color:{{fg}}; overflow:hidden; }
#eyebrow { position:absolute; top:80px; left:0; right:0; text-align:center; font-family:'Inter',sans-serif; font-size:28px; font-weight:800; letter-spacing:6px; text-transform:uppercase; opacity:.85; }
#headline { position:absolute; top:145px; left:0; right:0; text-align:center; padding:0 60px; font-family:'Anton',sans-serif; font-weight:400; font-size:80px; line-height:1; text-transform:uppercase; }
#caption-zone { position:absolute; bottom:230px; left:0; right:0; padding:0 90px; display:flex; align-items:center; justify-content:center; }
#caption { position:relative; width:100%; height:2.4em; }
.hl { padding:0 .14em; border-radius:10px; background:{{accent}}; color:{{bg}}; }

/* Bond-comparison stacked layout — canvas {{width}}x{{height}} */
/* #hero spans top=280 to top=1160 (height 880) within root */
#hero { position:absolute; top:280px; left:0; right:0; height:880px; }

/* Horizontal divider between ionic (0-400) and covalent (460-880) bands */
#h-divider { position:absolute; top:430px; left:40px; right:40px; height:1px; background:#444; }

.sec-label {
  position:absolute; left:50%; transform:translateX(-50%);
  font-family:'Inter',sans-serif; font-size:20px; font-weight:800;
  letter-spacing:5px; text-transform:uppercase;
}
/* Ionic label at top of ionic band (y=40 within hero) */
#lbl-ionic    { top:40px;  color:#FF2D95; }
/* Covalent label at top of covalent band (y=465 within hero) */
#lbl-covalent { top:465px; color:#1ABC9C; }

/* atom-g: centered via translate(-50%,-50%) at its left/top */
.atom-g { position:absolute; transform:translate(-50%,-50%); }
.nuc {
  position:absolute; width:76px; height:76px; border-radius:50%;
  top:50%; left:50%; transform:translate(-50%,-50%);
  display:flex; align-items:center; justify-content:center; z-index:2;
}
.nuc span { font-family:'Anton',sans-serif; font-size:28px; color:#FFFFFF; }
.orb-ring {
  position:absolute; width:220px; height:220px; border-radius:50%;
  border:2px dashed #444; top:50%; left:50%; transform:translate(-50%,-50%);
}
.e-pt { position:absolute; width:13px; height:13px; border-radius:50%; top:50%; left:50%; }

/* Charge labels 94px above atom center */
.charge-lbl {
  position:absolute; font-family:'Inter',sans-serif; font-size:32px; font-weight:700;
  top:calc(50% - 94px); left:50%; transform:translateX(-50%);
}

/* Shared electron pair — centered between H atoms (x=540, y=670 in hero) */
#shared-cov {
  position:absolute; top:670px; left:540px; transform:translate(-50%,-50%);
  display:flex; gap:10px; z-index:3;
}
.sh-dot { width:13px; height:13px; border-radius:50%; background:#1ABC9C; }

/* Jumping electron — starts at right edge of Na nucleus (x=418, y=194 in hero) */
/* Na at x=380, nucleus radius 38 → right edge = 418; y center 200, dot height 13 → top=194 */
#jump-e {
  position:absolute; width:13px; height:13px; border-radius:50%;
  background:#FF2D95; top:194px; left:418px; z-index:4;
}

/* Karaoke caption chunk (built by hfBuildCaptions; one .cw span per word) */
.cap-chunk { position:absolute; width:100%; left:0; top:50%; transform:translateY(-50%); font-family:'Inter',sans-serif; font-weight:900; text-align:center; line-height:1.25; font-size:var(--cap-size,66px); opacity:0; }
.cap-chunk .cw { display:inline-block; white-space:pre; }

#main-clip.vertical   { --cap-size:66px; }
#main-clip.horizontal { --cap-size:44px; }
#main-clip.horizontal #caption-zone { bottom:60px; padding:0 160px; }
#main-clip.horizontal #caption { max-width:1360px; margin:0 auto; }

#main-clip.horizontal #eyebrow  { top:50px; }
#main-clip.horizontal #headline { top:108px; font-size:74px; }
#main-clip.horizontal #hero     { top:240px; left:50%; right:auto; width:1080px; transform:translateX(-50%) scale(0.78); transform-origin:top center; }
</style>

<div id="root" data-composition-id="{{id}}" data-width="{{width}}" data-height="{{height}}" data-duration="{{duration}}" data-start="0">
  <section class="clip {{orientation}}" id="main-clip" data-start="0" data-duration="{{duration}}" data-track-index="1">
    <div id="eyebrow">{{eyebrow}}</div>
    <div id="headline">{{headline}}</div>

    <div id="hero">
      <!-- Section labels -->
      <div class="sec-label" id="lbl-ionic">Ionic</div>
      <div class="sec-label" id="lbl-covalent">Covalent</div>
      <div id="h-divider"></div>

      <!--
        IONIC top band (y=0-400 in hero, center y=200):
          Na (ion-a): x=380, y=200  →  nucleus x: 342-418, within [0,1080] ✓
          Cl (ion-b): x=700, y=200  →  nucleus x: 662-738, within [0,1080] ✓
          After separation (x ±50): Na center 330 (edges 292-368 ✓), Cl center 750 (edges 712-788 ✓)
          Charge label y: 200-94=106, within ionic band (0-400) ✓
      -->
      <div class="atom-g" id="ion-a" style="left:380px; top:200px;">
        <div class="nuc" style="background:#FF2D95;"><span>{{ionicAtom1}}</span></div>
        <div class="charge-lbl" id="charge-a" style="color:#FF2D95;">+</div>
      </div>
      <div class="atom-g" id="ion-b" style="left:700px; top:200px;">
        <div class="nuc" style="background:#666666;"><span>{{ionicAtom2}}</span></div>
        <div class="charge-lbl" id="charge-b" style="color:#FF2D95;">−</div>
      </div>
      <!-- Jumping electron: starts at Na right edge (418, 194), jumps to inside Cl (660, 194) -->
      <!-- Cl inner edge = 700-38=662; electron left=660 → right edge 673, inside Cl ✓ -->
      <div id="jump-e"></div>

      <!--
        COVALENT bottom band (y=460-880 in hero, center y=670):
          H_C (cov-c): x=380, y=670  →  orbit ring x: 270-490 ✓, y: 560-780 ✓
          H_D (cov-d): x=700, y=670  →  orbit ring x: 590-810 ✓, y: 560-780 ✓
          Electrons:
            ec-outer: (380-117, 670-6) = (263, 664) ✓
            ec-inner: (380+103, 670-6) = (483, 664) ✓
            ed-inner: (700-117, 670-6) = (583, 664) ✓
            ed-outer: (700+103, 670-6) = (803, 664) ✓
          After convergence (±80px):
            H_C→x=460: orbit x 350-570 ✓; H_D→x=620: orbit x 510-730 ✓
            Gap 160px, orbit 220px → 60px overlap ✓
      -->
      <div class="atom-g" id="cov-c" style="left:380px; top:670px;">
        <div class="orb-ring"></div>
        <div class="e-pt" id="ec-outer" style="background:#FFFFFF; margin-left:-117px; margin-top:-6px;"></div>
        <div class="e-pt" id="ec-inner" style="background:#FFFFFF; margin-left:103px; margin-top:-6px;"></div>
        <div class="nuc" style="background:#1ABC9C;"><span>{{covalentAtom1}}</span></div>
      </div>
      <div class="atom-g" id="cov-d" style="left:700px; top:670px;">
        <div class="orb-ring"></div>
        <div class="e-pt" id="ed-inner" style="background:#FFFFFF; margin-left:-117px; margin-top:-6px;"></div>
        <div class="e-pt" id="ed-outer" style="background:#FFFFFF; margin-left:103px; margin-top:-6px;"></div>
        <div class="nuc" style="background:#1ABC9C;"><span>{{covalentAtom2}}</span></div>
      </div>
      <!-- Shared pair appears at midpoint x=540 between converged atoms (460 and 620) -->
      <div id="shared-cov">
        <div class="sh-dot"></div><div class="sh-dot"></div>
      </div>
    </div>

    <div id="caption-zone"><div id="caption"></div></div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script>
window.__timelines = window.__timelines || {};
// SB-2
function hfEsc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
function hfHighlight(t){ return hfEsc(t).replace(/\*\*(.+?)\*\*/g,'<span class="hl">$1<\/span>'); }
['eyebrow','headline'].forEach(function(id){ var el=document.getElementById(id); if(!el)return; var t=el.textContent.trim(); if(!t){el.style.display='none';return;} el.innerHTML=hfHighlight(t); });
// .nuc is a fixed 76px circle meant for a short symbol (e.g. "Na") — shrink
// to fit if a longer label ever ends up there instead, rather than overflow.
document.querySelectorAll('.nuc span').forEach(function(span){
  if (!window.__hyperframes || !window.__hyperframes.fitTextFontSize) return;
  var result = window.__hyperframes.fitTextFontSize(span.textContent, { fontFamily:'Anton', fontWeight:400, maxWidth:56, baseFontSize:28, minFontSize:14 });
  span.style.fontSize = result.fontSize + 'px';
});
function hfSplitMarks(t){ return String(t).replace(/\*\*(.+?)\*\*/g,function(_m,inner){ return inner.split(/\s+/).map(function(w){ return '**'+w+'**'; }).join(' '); }); }
function hfBuildCaptions(cv){ var arr=Array.isArray(cv)?cv:[]; var host=document.getElementById('caption'); return arr.map(function(c){ var d=document.createElement('div'); d.className='cap-chunk'; var ws=Array.isArray(c.words)?c.words:[]; d.innerHTML= ws.length ? ws.map(function(w){ return '<span class="cw">'+hfHighlight(w.text)+' </span>'; }).join('') : hfHighlight(hfSplitMarks(c.text)); host.appendChild(d); return d; }); }
function hfAnimateCaptions(tl,ch,timings){ ch.forEach(function(el,i){ var t=timings[i]; if(!t)return; tl.to(el,{opacity:1,duration:i===0?0.2:0.18},t.start); if(i<ch.length-1){ var nextStart=timings[i+1]?timings[i+1].start:t.end; tl.to(el,{opacity:0,duration:0.12},Math.max(t.start,nextStart-0.12)); }
  // Karaoke: only the word being spoken holds capHighlight; every other word
  // keeps the caption color. Emphasis pills (.hl) opt out.
  var ws=Array.isArray(t.words)?t.words:[]; var spans=el.querySelectorAll('.cw'); ws.forEach(function(w,wi){ var span=spans[wi]; if(!span||span.querySelector('.hl'))return; tl.to(span,{color:'{{capHighlight}}',duration:0.12,ease:'power2.out'},w.start); tl.to(span,{color:'{{fg}}',duration:0.15},Math.max(w.start+0.12,w.end)); }); }); }

// Initial hidden state (all seek-safe gsap.set calls)
gsap.set(['#ion-a','#ion-b','#cov-c','#cov-d'],            { opacity:0 });
gsap.set(['#charge-a','#charge-b'],                         { opacity:0 });
gsap.set('#shared-cov',                                     { opacity:0 });
gsap.set(['#lbl-ionic','#lbl-covalent','#h-divider'],       { opacity:0 });
gsap.set('#jump-e',                                         { opacity:0 });
gsap.set(['#ec-inner','#ed-inner','#ec-outer','#ed-outer'], { opacity:0 });
gsap.set('#eyebrow',                                        { opacity:0, y:-12 });
gsap.set('#headline',                                       { opacity:0, scale:1.15 });

var tl = gsap.timeline({ paused:true });

// Reveal labels, divider, eyebrow, headline
tl.to(['#lbl-ionic','#lbl-covalent','#h-divider'], { opacity:1, duration:0.4 }, 0);
tl.to('#eyebrow',  { opacity:1, y:0, duration:0.3, ease:'power2.out' }, 0.1);
tl.to('#headline', { opacity:1, scale:1, duration:0.35, ease:'back.out(1.6)' }, 0.2);

// Reveal atoms (both bands simultaneously)
tl.to(['#ion-a','#ion-b'],   { opacity:1, duration:0.4, stagger:0.1 }, 0.2);
tl.to(['#cov-c','#cov-d'],   { opacity:1, duration:0.4, stagger:0.1 }, 0.2);
tl.to(['#ec-outer','#ed-outer','#ec-inner','#ed-inner'], { opacity:1, duration:0.3, stagger:0.05 }, 0.5);
tl.to('#jump-e', { opacity:1, duration:0.1 }, 0.75);

// IONIC track: electron jumps from Na right edge (left=418) to inside Cl (left=660)
// Cl inner edge = 700-38=662; electron left=660 → electron right edge=673, inside Cl ✓
tl.to('#jump-e', { left:660, duration:0.55, ease:'power2.inOut' }, 0.8);
// Charges pop in, then atoms repel
tl.to(['#charge-a','#charge-b'], { opacity:1, duration:0.3 }, 1.4);
tl.to('#ion-a', { x:-50, duration:0.4, ease:'power2.out' }, 1.5);
tl.to('#ion-b', { x: 50, duration:0.4, ease:'power2.out' }, 1.5);

// COVALENT track: atoms converge 80px each → gap 160px, orbit 220px → 60px overlap
// H_C: 380→460 (x+80); H_D: 700→620 (x-80); shared pair at midpoint x=540
tl.to('#cov-c', { x: 80, duration:0.9, ease:'power2.inOut' }, 0.8);
tl.to('#cov-d', { x:-80, duration:0.9, ease:'power2.inOut' }, 0.8);
tl.to(['#ec-inner','#ed-inner'], { opacity:0, duration:0.25 }, 1.55);
tl.to('#shared-cov', { opacity:1, duration:0.4, ease:'power2.out' }, 1.65);

var captionTiming = {{captionTiming}};
var chunks = hfBuildCaptions(captionTiming);
hfAnimateCaptions(tl, chunks, captionTiming);

window.__timelines['{{id}}'] = tl;
</script>
</template>
</body>
</html>
