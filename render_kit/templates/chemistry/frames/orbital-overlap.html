<!doctype html>
<html>
<head><meta charset="UTF-8" /></head>
<body>
<template>
<style>
/* SB-1 */
@import url("https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700;800;900&display=swap");
#root { position:absolute; inset:0; width:{{width}}px; height:{{height}}px; background:{{bg}}; color:{{fg}}; overflow:hidden; }
#eyebrow { position:absolute; top:120px; left:0; right:0; text-align:center; font-family:'Inter',sans-serif; font-size:34px; font-weight:800; letter-spacing:6px; text-transform:uppercase; opacity:.85; }
#headline { position:absolute; top:1370px; left:0; right:0; text-align:center; padding:0 80px; font-family:'Anton',sans-serif; font-weight:400; font-size:120px; line-height:.98; text-transform:uppercase; }
#caption-zone { position:absolute; bottom:230px; left:0; right:0; padding:0 90px; display:flex; align-items:center; justify-content:center; }
#caption { position:relative; width:100%; height:2.4em; }
.hl { padding:0 .14em; border-radius:10px; background:{{accent}}; color:{{bg}}; }

/* Orbital */
#hero { position:absolute; top:330px; left:0; right:0; height:880px; }
.atom-group { position:absolute; transform:translate(-50%,-50%); }
.orb-ring {
  position:absolute; width:300px; height:300px; border-radius:50%;
  border:3px dashed {{fg}}; opacity:.45;
  top:50%; left:50%; transform:translate(-50%,-50%);
}
.nuc {
  position:absolute; width:90px; height:90px; border-radius:50%; background:{{fg}};
  top:50%; left:50%; transform:translate(-50%,-50%);
  display:flex; align-items:center; justify-content:center; z-index:2;
}
.nuc span { font-family:'Anton',sans-serif; font-size:40px; color:{{bg}}; }
.e-dot {
  position:absolute; width:14px; height:14px; border-radius:50%; background:{{fg}};
  top:50%; left:50%;
}
.atom-lbl {
  position:absolute; top:170px; left:50%; transform:translateX(-50%);
  font-family:'Inter',sans-serif; font-size:26px; font-weight:700;
  color:{{fg}}; letter-spacing:3px; text-transform:uppercase; white-space:nowrap; opacity:.7;
}
#glow {
  position:absolute; width:220px; height:220px; border-radius:50%;
  background:radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 70%);
  left:540px; top:50%; transform:translate(-50%,-50%);
  pointer-events:none;
}
#shared-pair {
  position:absolute; left:540px; top:50%; transform:translate(-50%,-50%);
  display:flex; gap:12px; z-index:3;
}
.sh-dot { width:16px; height:16px; border-radius:50%; background:{{fg}}; }
#bond-label {
  position:absolute; left:540px; top:calc(50% + 50px); transform:translateX(-50%);
  font-family:'Inter',sans-serif; font-size:22px; font-weight:800;
  color:{{fg}}; letter-spacing:3px; text-transform:uppercase; white-space:nowrap; z-index:3;
}
</style>

<div id="root" data-composition-id="{{id}}" data-width="{{width}}" data-height="{{height}}" data-duration="{{duration}}" data-start="0">
  <section class="clip" id="main-clip" data-start="0" data-duration="{{duration}}" data-track-index="1">
    <div id="eyebrow">{{eyebrow}}</div>

    <div id="hero">
      <div id="glow"></div>

      <div class="atom-group" id="atom1" style="left:220px; top:50%;">
        <div class="orb-ring"></div>
        <div class="e-dot" id="e1-outer" style="margin-left:-157px; margin-top:-7px;"></div>
        <div class="e-dot" id="e1-inner" style="margin-left:143px; margin-top:-7px;"></div>
        <div class="nuc"><span>{{atom1}}</span></div>
        <div class="atom-lbl">{{atom1}}</div>
      </div>

      <div class="atom-group" id="atom2" style="left:860px; top:50%;">
        <div class="orb-ring"></div>
        <div class="e-dot" id="e2-inner" style="margin-left:-157px; margin-top:-7px;"></div>
        <div class="e-dot" id="e2-outer" style="margin-left:143px; margin-top:-7px;"></div>
        <div class="nuc"><span>{{atom2}}</span></div>
        <div class="atom-lbl">{{atom2}}</div>
      </div>

      <div id="shared-pair">
        <div class="sh-dot"></div><div class="sh-dot"></div>
      </div>
      <div id="bond-label">Shared pair</div>
    </div>

    <div id="headline">{{headline}}</div>
    <div id="caption-zone"><div id="caption"></div></div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script>
window.__timelines = window.__timelines || {};
// SB-2
function hfEsc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
function hfHighlight(t){ return hfEsc(t).replace(/\*\*(.+?)\*\*/g,'<span class="hl">$1<\/span>'); }
['eyebrow','headline'].forEach(function(id){ var el=document.getElementById(id); if(!el)return; var t=el.textContent.trim(); if(!t){el.style.display='none';return;} el.innerHTML=hfHighlight(t); });
// .nuc is a fixed 90px circle meant for a short symbol (e.g. "Na") — shrink
// to fit if a longer label ever ends up there instead, rather than overflow.
document.querySelectorAll('.nuc span').forEach(function(span){
  if (!window.__hyperframes || !window.__hyperframes.fitTextFontSize) return;
  var result = window.__hyperframes.fitTextFontSize(span.textContent, { fontFamily:'Anton', fontWeight:400, maxWidth:66, baseFontSize:40, minFontSize:16 });
  span.style.fontSize = result.fontSize + 'px';
});
function hfBuildCaptions(cv){ var arr=Array.isArray(cv)?cv:[]; var host=document.getElementById('caption'); return arr.map(function(c){ var d=document.createElement('div'); d.style.cssText='position:absolute;width:100%;left:0;top:50%;transform:translateY(-50%);font-family:Inter,sans-serif;font-size:66px;font-weight:900;text-align:center;line-height:1.25;opacity:0;'; d.innerHTML=hfHighlight(c.text); host.appendChild(d); return d; }); }
function hfAnimateCaptions(tl,ch,timings){ ch.forEach(function(el,i){ var t=timings[i]; if(!t)return; tl.to(el,{opacity:1,duration:i===0?0.2:0.18},t.start); if(i<ch.length-1){ var nextStart=timings[i+1]?timings[i+1].start:t.end; tl.to(el,{opacity:0,duration:0.12},Math.max(t.start,nextStart-0.12)); } }); }

gsap.set(['#atom1','#atom2'],                                { opacity:0 });
gsap.set(['#e1-outer','#e1-inner','#e2-outer','#e2-inner'], { opacity:0 });
gsap.set('#glow',                                           { opacity:0, scale:0 });
gsap.set(['#shared-pair','#bond-label'],                    { opacity:0 });
gsap.set('#eyebrow',                                        { opacity:0, y:-12 });
gsap.set('#headline',                                       { opacity:0, scale:1.2 });

var tl = gsap.timeline({ paused:true });

tl.to('#eyebrow',                                              { opacity:1, y:0, duration:0.3, ease:'power2.out' }, 0.1);
tl.to(['#atom1','#atom2'],                                     { opacity:1, duration:0.4 }, 0.2);
tl.to(['#e1-outer','#e1-inner','#e2-outer','#e2-inner'],       { opacity:1, duration:0.3, stagger:0.06 }, 0.7);

// Converge: atom1 center 220→420 (+200px), atom2 center 860→660 (-200px).
// Ring diam 300 (radius 150). End gap=240px → ring overlap=60px.
// Atom1 end canvas bounds [270..570]; atom2 end [510..810] — both within [0,1080].
tl.to('#atom1', { x:200, duration:1.2, ease:'power2.inOut' }, 1.0);
tl.to('#atom2', { x:-200, duration:1.2, ease:'power2.inOut' }, 1.0);

// Glow erupts as clouds meet
tl.to('#glow', { opacity:1, scale:1, duration:0.5, ease:'power2.out' }, 1.6);
tl.to('#glow', { scale:1.2, duration:0.35, ease:'power1.out' }, 2.1);
tl.to('#glow', { scale:1.0, opacity:0.65, duration:0.45, ease:'power1.in' }, 2.45);

// Fade inner electrons at contact (now shared)
tl.to(['#e1-inner','#e2-inner'], { opacity:0, duration:0.3 }, 1.7);

// Pop shared pair at center
tl.to(['#shared-pair','#bond-label'], { opacity:1, duration:0.4, ease:'power2.out' }, 2.1);
tl.to('#shared-pair', { scale:1.35, duration:0.2, ease:'power1.out' }, 2.3);
tl.to('#shared-pair', { scale:1.0, duration:0.2, ease:'power1.in' }, 2.5);

// Headline slams in
tl.to('#headline', { opacity:1, scale:1, duration:0.35, ease:'back.out(1.6)' }, 2.7);

var captionTiming = {{captionTiming}};
var chunks = hfBuildCaptions(captionTiming);
hfAnimateCaptions(tl, chunks, captionTiming);

window.__timelines['{{id}}'] = tl;
</script>
</template>
</body>
</html>
