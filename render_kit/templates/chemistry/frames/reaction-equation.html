<!doctype html>
<html>
<head><meta charset="UTF-8" /></head>
<body>
<template>
<style>
  @import url("https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@400;500;700;900&display=swap");
  #root { position: absolute; inset: 0; width: {{width}}px; height: {{height}}px; background: {{bg}}; color: {{fg}}; overflow: hidden; }
  /* Reactants -> arrow -> products, stacked vertically (not a single wide
     row) — a 1080px-wide canvas can't fit a long horizontal equation the
     way the original 1920px landscape layout did. */
  #visual-zone {
    position: absolute; top: 0; left: 0; right: 0; height: 1500px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 44px;
  }
  #eq-title {
    font-family: 'Inter', sans-serif; font-size: 22px; font-weight: 500;
    opacity: 0.55; letter-spacing: 3px; text-transform: uppercase;
  }
  .eq-row { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 24px; max-width: 900px; }
  .eq-term { font-family: 'Playfair Display', serif; font-size: 88px; font-weight: 400; color: {{fg}}; line-height: 1; }
  .eq-op   { font-family: 'Inter', sans-serif; font-size: 44px; font-weight: 400; color: {{fg}}; opacity: 0.5; line-height: 1; }
  #arrow-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  #arrow-label {
    font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 500;
    opacity: 0.55; letter-spacing: 2px; text-transform: uppercase;
  }
  #caption-zone {
    position: absolute; bottom: 230px; left: 0; right: 0;
    padding: 0 90px; display: flex; align-items: center; justify-content: center;
  }
  #caption { position: relative; width: 100%; height: 2.4em; }
  .hl { padding:0 .14em; border-radius:10px; background:{{accent}}; color:{{bg}}; }

/* Karaoke caption chunk (built by hfBuildCaptions; one .cw span per word) */
.cap-chunk { position:absolute; width:100%; left:0; top:50%; transform:translateY(-50%); font-family:'Inter',sans-serif; font-weight:900; text-align:center; line-height:1.25; font-size:var(--cap-size,66px); opacity:0; }
.cap-chunk .cw { display:inline-block; white-space:pre; }

#main-clip.vertical   { --cap-size:66px; }
#main-clip.horizontal { --cap-size:44px; }
#main-clip.horizontal #caption-zone { bottom:60px; padding:0 160px; }
#main-clip.horizontal #caption { max-width:1360px; margin:0 auto; }

#main-clip.horizontal #visual-zone { height:840px; gap:28px; }
#main-clip.horizontal .eq-term     { font-size:74px; }
</style>

<div id="root" data-composition-id="{{id}}" data-width="{{width}}" data-height="{{height}}" data-duration="{{duration}}" data-start="0">
  <section class="clip {{orientation}}" id="main-clip" data-start="0" data-duration="{{duration}}" data-track-index="1">
    <div id="visual-zone">
      <div id="eq-title">{{eqTitle}}</div>
      <div class="eq-row" id="reactants-row">
        <span class="eq-term" id="r1">{{r1}}</span>
        <span class="eq-op"   id="plus1">+</span>
        <span class="eq-term" id="r2">{{r2}}</span>
        <span class="eq-op"   id="plus2">+</span>
        <span class="eq-term" id="r3">{{r3}}</span>
      </div>
      <div id="arrow-wrap">
        <div id="arrow-label">{{label}}</div>
        <svg viewBox="0 0 44 190" width="44" height="190" overflow="visible">
          <line id="arrow-line" x1="22" y1="0" x2="22" y2="160"
            stroke="{{fg}}" stroke-width="2.5"
            stroke-dasharray="165" stroke-dashoffset="165"/>
          <polygon id="arrow-head" points="10,150 22,172 34,150" fill="{{fg}}" opacity="0"/>
        </svg>
      </div>
      <div class="eq-row" id="products-row">
        <span class="eq-term" id="p1">{{p1}}</span>
        <span class="eq-op"   id="plus3">+</span>
        <span class="eq-term" id="p2">{{p2}}</span>
      </div>
    </div>
    <div id="caption-zone"><div id="caption"></div></div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script>
  window.__timelines = window.__timelines || {};
  function hfEsc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
  function hfHighlight(t){ return hfEsc(t).replace(/\*\*(.+?)\*\*/g,'<span class="hl">$1<\/span>'); }
  function hfSplitMarks(t){ return String(t).replace(/\*\*(.+?)\*\*/g,function(_m,inner){ return inner.split(/\s+/).map(function(w){ return '**'+w+'**'; }).join(' '); }); }
function hfBuildCaptions(cv){ var arr=Array.isArray(cv)?cv:[]; var host=document.getElementById('caption'); return arr.map(function(c){ var d=document.createElement('div'); d.className='cap-chunk'; var ws=Array.isArray(c.words)?c.words:[]; d.innerHTML= ws.length ? ws.map(function(w){ return '<span class="cw">'+hfHighlight(w.text)+' </span>'; }).join('') : hfHighlight(hfSplitMarks(c.text)); host.appendChild(d); return d; }); }
  function hfAnimateCaptions(tl,ch,timings){ ch.forEach(function(el,i){ var t=timings[i]; if(!t)return; tl.to(el,{opacity:1,duration:i===0?0.2:0.18},t.start); if(i<ch.length-1){ var nextStart=timings[i+1]?timings[i+1].start:t.end; tl.to(el,{opacity:0,duration:0.12},Math.max(t.start,nextStart-0.12)); }
  // Karaoke: only the word being spoken holds capHighlight; every other word
  // keeps the caption color. Emphasis pills (.hl) opt out.
  var ws=Array.isArray(t.words)?t.words:[]; var spans=el.querySelectorAll('.cw'); ws.forEach(function(w,wi){ var span=spans[wi]; if(!span||span.querySelector('.hl'))return; tl.to(span,{color:'{{capHighlight}}',duration:0.12,ease:'power2.out'},w.start); tl.to(span,{color:'{{fg}}',duration:0.15},Math.max(w.start+0.12,w.end)); }); }); }

  // Hide optional terms and their adjacent operators when empty
  [['r2','plus1'],['r3','plus2'],['p2','plus3']].forEach(function(pair) {
    var tid = pair[0], oid = pair[1];
    if (!document.getElementById(tid).textContent.trim()) {
      document.getElementById(tid).style.display = 'none';
      document.getElementById(oid).style.display = 'none';
    }
  });
  if (!document.getElementById('eq-title').textContent.trim())   document.getElementById('eq-title').style.display   = 'none';
  if (!document.getElementById('arrow-label').textContent.trim()) document.getElementById('arrow-label').style.display = 'none';

  gsap.set(['#r1','#r2','#r3','#plus1','#plus2'], { opacity: 0, y: 20 });
  gsap.set(['#p1','#p2','#plus3'],                { opacity: 0, y: 20 });
  gsap.set('#arrow-label',                         { opacity: 0 });
  gsap.set('#eq-title',                            { opacity: 0 });

  const tl = gsap.timeline({ paused: true });
  tl.to('#eq-title',           { opacity: 0.55, duration: 0.4 }, 0);
  tl.to(['#r1','#r2','#r3'],   { opacity: 1,    y: 0, duration: 0.4, ease: 'power3.out', stagger: 0.12 }, 0.2);
  tl.to(['#plus1','#plus2'],   { opacity: 0.5,  y: 0, duration: 0.4, ease: 'power3.out', stagger: 0.12 }, 0.32);
  tl.to('#arrow-line',         { strokeDashoffset: 0, duration: 0.5, ease: 'power2.inOut' }, 0.85);
  tl.to('#arrow-head',         { opacity: 1, duration: 0.15 }, 1.3);
  tl.to('#arrow-label',        { opacity: 0.55, duration: 0.3 }, 1.0);
  tl.to(['#p1','#p2'],         { opacity: 1,    y: 0, duration: 0.4, ease: 'power3.out', stagger: 0.12 }, 1.4);
  tl.to('#plus3',              { opacity: 0.5,  y: 0, duration: 0.4, ease: 'power3.out' }, 1.52);

  var captionTiming = {{captionTiming}};
  var chunks = hfBuildCaptions(captionTiming);
  hfAnimateCaptions(tl, chunks, captionTiming);

  window.__timelines['{{id}}'] = tl;
</script>
</template>
</body>
</html>
