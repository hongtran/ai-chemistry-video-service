<!doctype html>
<html>
<head><meta charset="UTF-8" /></head>
<body>
<template>
<style>
@import url("https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700;800;900&display=swap");
#root { position:absolute; inset:0; width:{{width}}px; height:{{height}}px; background:{{bg}}; color:{{fg}}; overflow:hidden; }
#eyebrow { position:absolute; top:120px; left:0; right:0; text-align:center; font-family:'Inter',sans-serif; font-size:34px; font-weight:800; letter-spacing:6px; text-transform:uppercase; opacity:.85; }
#hero { position:absolute; top:280px; left:0; right:0; height:560px; display:flex; align-items:center; justify-content:center; }
#beaker { position:relative; width:520px; height:520px; border:10px solid {{fg}}; border-radius:32px; }
.ion { position:absolute; width:64px; height:64px; border-radius:50%; background:{{particleColor}}; color:{{bg}}; display:flex; align-items:center; justify-content:center; font-family:'Inter',sans-serif; font-weight:900; font-size:26px; }
#counter { position:absolute; top:880px; left:0; right:0; text-align:center; font-family:'Anton',sans-serif; font-size:200px; line-height:1; }
#container-label { position:absolute; top:1110px; left:0; right:0; text-align:center; font-family:'Inter',sans-serif; font-weight:800; font-size:30px; letter-spacing:3px; text-transform:uppercase; opacity:.8; }
#headline { position:absolute; top:1190px; left:0; right:0; text-align:center; padding:0 80px; font-family:'Anton',sans-serif; font-size:84px; line-height:1; text-transform:uppercase; }
#result { position:absolute; top:1330px; left:0; right:0; text-align:center; padding:0 80px; font-family:'Inter',sans-serif; font-size:36px; font-weight:800; color:{{accent}}; }
#caption-zone { position:absolute; bottom:230px; left:0; right:0; padding:0 90px; display:flex; align-items:center; justify-content:center; }
#caption { position:relative; width:100%; height:2.4em; }
.hl { padding:0 .14em; border-radius:10px; background:{{accent}}; color:{{bg}}; }
</style>

<div id="root" data-composition-id="{{id}}" data-width="{{width}}" data-height="{{height}}" data-duration="{{duration}}" data-start="0">
  <section class="clip" id="main-clip" data-start="0" data-duration="{{duration}}" data-track-index="1">
    <div id="eyebrow">{{eyebrow}}</div>
    <div id="hero"><div id="beaker"></div></div>
    <div id="counter">0</div>
    <div id="container-label">{{containerLabel}}</div>
    <div id="headline">{{headline}}</div>
    <div id="result">{{result}}</div>
    <div id="caption-zone"><div id="caption"></div></div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script>
window.__timelines = window.__timelines || {};
function hfEsc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
function hfHighlight(t){ return hfEsc(t).replace(/\*\*(.+?)\*\*/g,'<span class="hl">$1<\/span>'); }
['eyebrow','headline'].forEach(function(id){ var el=document.getElementById(id); if(!el)return; var t=el.textContent.trim(); if(!t){el.style.display='none';return;} el.innerHTML=hfHighlight(t); });
var rEl=document.getElementById('result'); if(rEl && !rEl.textContent.trim()) rEl.style.display='none';
function hfBuildCaptions(cv){ var arr=Array.isArray(cv)?cv:[]; var host=document.getElementById('caption'); return arr.map(function(c){ var d=document.createElement('div'); d.style.cssText='position:absolute;width:100%;left:0;top:50%;transform:translateY(-50%);font-family:Inter,sans-serif;font-size:66px;font-weight:900;text-align:center;line-height:1.25;opacity:0;'; d.innerHTML=hfHighlight(c.text); host.appendChild(d); return d; }); }
function hfAnimateCaptions(tl,ch,timings){ ch.forEach(function(el,i){ var t=timings[i]; if(!t)return; tl.to(el,{opacity:1,duration:i===0?0.2:0.18},t.start); if(i<ch.length-1){ var nextStart=timings[i+1]?timings[i+1].start:t.end; tl.to(el,{opacity:0,duration:0.12},Math.max(t.start,nextStart-0.12)); } }); }

var label = '{{particleLabel}}';
var count = parseInt('{{targetCount}}') || 0;
var beaker = document.getElementById('beaker');
// Deterministic grid layout inside the 520px beaker (60px cells, 6 cols).
var cols = 6, cell = 78, pad = 24, ions = [];
for (var i = 0; i < count; i++){
  var r = Math.floor(i / cols), c = i % cols;
  var el = document.createElement('div');
  el.className = 'ion';
  el.style.left = (pad + c * cell) + 'px';
  el.style.bottom = (pad + r * cell) + 'px';
  el.textContent = label;
  beaker.appendChild(el);
  ions.push(el);
}

if (!document.getElementById('container-label').textContent.trim()) document.getElementById('container-label').style.display='none';
gsap.set('.ion', { scale:0, opacity:0, transformOrigin:'center' });
gsap.set('#eyebrow', { opacity:0, y:-12 });
gsap.set('#result', { opacity:0, scale:0, transformOrigin:'center' });

var tl = gsap.timeline({ paused:true });
tl.to('#eyebrow', { opacity:1, y:0, duration:0.3 }, 0.1);

// Pop ions in on a stagger; tick the counter in lockstep.
var counterEl = document.getElementById('counter');
var popDur = Math.min(2.2, (parseFloat('{{duration}}')||5) * 0.5);
var stagger = count > 0 ? popDur / count : 0;
ions.forEach(function(el, i){
  var at = 0.4 + i * stagger;
  tl.to(el, { scale:1, opacity:1, duration:0.18, ease:'back.out(2)' }, at);
});
// Seek-safe count-up: tween a proxy 0→count and write Math.round on every update.
var counterProxy = { n: 0 };
tl.to(counterProxy, { n: count, duration: (popDur || 0.001), ease: 'none',
  onUpdate: function(){ counterEl.textContent = String(Math.round(counterProxy.n)); } }, 0.4);
tl.to('#counter', { scale:1.12, duration:0.15, yoyo:true, repeat:1, transformOrigin:'center' }, 0.4 + popDur);
tl.to('#result', { opacity:1, scale:1, duration:0.3, ease:'back.out(2)' }, 0.4 + popDur + 0.3);

var captionTiming = {{captionTiming}};
var chunks = hfBuildCaptions(captionTiming);
hfAnimateCaptions(tl, chunks, captionTiming);

window.__timelines['{{id}}'] = tl;
</script>
</template>
</body>
</html>
