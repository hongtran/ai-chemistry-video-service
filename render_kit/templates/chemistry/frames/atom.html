<!doctype html>
<html>
<head><meta charset="UTF-8" /></head>
<body>
<template>
<style>
/* SB-1 */
@import url("https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700;800;900&display=swap");
#root { position:absolute; inset:0; width:{{width}}px; height:{{height}}px; background:{{bg}}; color:{{fg}}; overflow:hidden; }
#eyebrow { position:absolute; top:120px; left:0; right:0; text-align:center; font-family:'Inter',sans-serif; font-size:34px; font-weight:800; letter-spacing:6px; text-transform:uppercase; opacity:.85; }
#headline { position:absolute; top:1060px; left:0; right:0; text-align:center; padding:0 80px; font-family:'Anton',sans-serif; font-weight:400; font-size:90px; line-height:1.05; text-transform:uppercase; }
#caption-zone { position:absolute; bottom:230px; left:0; right:0; padding:0 90px; display:flex; align-items:center; justify-content:center; }
#caption { position:relative; width:100%; height:2.4em; }
.hl { padding:0 .14em; border-radius:10px; background:{{accent}}; color:{{bg}}; }

/* Atom-specific */
#hero { position:absolute; top:240px; left:0; right:0; height:780px; display:flex; align-items:center; justify-content:center; }
#atom-container { position:relative; width:660px; height:660px; }
#nucleus {
  position:absolute; width:120px; height:120px; border-radius:50%;
  background:{{fg}}; top:50%; left:50%; transform:translate(-50%,-50%);
  display:flex; align-items:center; justify-content:center; z-index:2;
}
#nucleus-symbol { font-family:'Anton',sans-serif; font-size:52px; color:{{bg}}; }
.shell-ring {
  position:absolute; border-radius:50%; border:3px dashed {{fg}};
  top:50%; left:50%; transform:translate(-50%,-50%);
}
#shell-ring-1 { width:280px; height:280px; }
#shell-ring-2 { width:440px; height:440px; }
#shell-ring-3 { width:600px; height:600px; }
.e-wrapper { position:absolute; top:50%; left:50%; width:0; height:0; transform-origin:0 0; }
.e-dot { position:absolute; width:20px; height:20px; border-radius:50%; background:{{fg}}; left:-10px; }
@keyframes orbit-cw  { from { transform:rotate(0deg); }   to { transform:rotate(360deg); } }
@keyframes orbit-ccw { from { transform:rotate(0deg); }   to { transform:rotate(-360deg); } }

/* Karaoke caption chunk (built by hfBuildCaptions; one .cw span per word) */
.cap-chunk { position:absolute; width:100%; left:0; top:50%; transform:translateY(-50%); font-family:'Inter',sans-serif; font-weight:900; text-align:center; line-height:1.25; font-size:var(--cap-size,66px); opacity:0; }
.cap-chunk .cw { display:inline-block; white-space:pre; }

#main-clip.vertical   { --cap-size:66px; }
#main-clip.horizontal { --cap-size:44px; }
#main-clip.horizontal #caption-zone { bottom:60px; padding:0 160px; }
#main-clip.horizontal #caption { max-width:1360px; margin:0 auto; }

#main-clip.horizontal #eyebrow        { top:70px; }
#main-clip.horizontal #hero           { top:130px; height:600px; }
#main-clip.horizontal #atom-container { transform:scale(0.62); }
#main-clip.horizontal #headline       { top:760px; font-size:70px; }
</style>

<div id="root" data-composition-id="{{id}}" data-width="{{width}}" data-height="{{height}}" data-duration="{{duration}}" data-start="0">
  <section class="clip {{orientation}}" id="main-clip" data-start="0" data-duration="{{duration}}" data-track-index="1">
    <div id="eyebrow">{{title}}</div>
    <div id="hero">
      <div id="atom-container">
        <div id="nucleus"><span id="nucleus-symbol">{{symbol}}</span></div>
        <div class="shell-ring" id="shell-ring-1"></div>
        <div class="shell-ring" id="shell-ring-2"></div>
        <div class="shell-ring" id="shell-ring-3"></div>
      </div>
    </div>
    <div id="headline">{{headline}}</div>
    <div id="caption-zone"><div id="caption"></div></div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script>
window.__timelines = window.__timelines || {};
// SB-2
function hfEsc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
function hfHighlight(t){ return hfEsc(t).replace(/\*\*(.+?)\*\*/g,'<span class="hl">$1<\/span>'); }
['eyebrow','headline'].forEach(function(id){ var el=document.getElementById(id); if(!el)return; var t=el.textContent.trim(); if(!t){el.style.display='none';return;} el.innerHTML=hfHighlight(t); });
function hfSplitMarks(t){ return String(t).replace(/\*\*(.+?)\*\*/g,function(_m,inner){ return inner.split(/\s+/).map(function(w){ return '**'+w+'**'; }).join(' '); }); }
function hfBuildCaptions(cv){ var arr=Array.isArray(cv)?cv:[]; var host=document.getElementById('caption'); return arr.map(function(c){ var d=document.createElement('div'); d.className='cap-chunk'; var ws=Array.isArray(c.words)?c.words:[]; d.innerHTML= ws.length ? ws.map(function(w){ return '<span class="cw">'+hfHighlight(w.text)+' </span>'; }).join('') : hfHighlight(hfSplitMarks(c.text)); host.appendChild(d); return d; }); }
function hfAnimateCaptions(tl,ch,timings){ ch.forEach(function(el,i){ var t=timings[i]; if(!t)return; tl.to(el,{opacity:1,duration:i===0?0.2:0.18},t.start); if(i<ch.length-1){ var nextStart=timings[i+1]?timings[i+1].start:t.end; tl.to(el,{opacity:0,duration:0.12},Math.max(t.start,nextStart-0.12)); }
  // Karaoke: only the word being spoken holds capHighlight; every other word
  // keeps the caption color. Emphasis pills (.hl) opt out.
  var ws=Array.isArray(t.words)?t.words:[]; var spans=el.querySelectorAll('.cw'); ws.forEach(function(w,wi){ var span=spans[wi]; if(!span||span.querySelector('.hl'))return; tl.to(span,{color:'{{capHighlight}}',duration:0.12,ease:'power2.out'},w.start); tl.to(span,{color:'{{fg}}',duration:0.15},Math.max(w.start+0.12,w.end)); }); }); }

// Shell/electron construction (preserved)
var shellDefs = [
  { count: parseInt('{{shell1}}') || 0, radius: 140, dur: 3, dir: 'cw',  ringId: 'shell-ring-1', cls: 'e-s1' },
  { count: parseInt('{{shell2}}') || 0, radius: 220, dur: 5, dir: 'ccw', ringId: 'shell-ring-2', cls: 'e-s2' },
  { count: parseInt('{{shell3}}') || 0, radius: 300, dur: 8, dir: 'cw',  ringId: 'shell-ring-3', cls: 'e-s3' },
];
var container = document.getElementById('atom-container');

shellDefs.forEach(function(s) {
  if (s.count === 0) { document.getElementById(s.ringId).style.display = 'none'; return; }
  for (var i = 0; i < s.count; i++) {
    var wrapper = document.createElement('div');
    wrapper.className = 'e-wrapper ' + s.cls;
    wrapper.style.animation = 'orbit-' + s.dir + ' ' + s.dur + 's linear infinite';
    wrapper.style.animationDelay = (-(i / s.count) * s.dur) + 's';
    var dot = document.createElement('div');
    dot.className = 'e-dot';
    dot.style.top = (-s.radius - 10) + 'px';
    wrapper.appendChild(dot);
    container.appendChild(wrapper);
  }
});

// Shell-fill beat: empty slot marker on shell-1 (radius 140 → margin-top -150px = -(140+10))
var slot = document.createElement('div'); slot.id='empty-slot';
slot.style.cssText='position:absolute;top:50%;left:50%;width:20px;height:20px;border:3px dashed '+'{{fg}}'+';border-radius:50%;margin-top:-150px;margin-left:-10px;opacity:0;';
document.getElementById('atom-container').appendChild(slot);

gsap.set('#nucleus',    { opacity:0, scale:0 });
gsap.set('#eyebrow',    { opacity:0, y:-12 });
gsap.set('#headline',   { opacity:0, y:20 });
gsap.set('.shell-ring', { opacity:0 });
gsap.set('.e-wrapper',  { opacity:0 });

var tl = gsap.timeline({ paused:true });
tl.to('#eyebrow',      { opacity:1, y:0, duration:0.3, ease:'power2.out' }, 0);
tl.to('#nucleus',      { opacity:1, scale:1, duration:0.4, ease:'back.out(1.4)' }, 0);
tl.to('#shell-ring-1', { opacity:0.5, duration:0.3 }, 0.3);
tl.to('.e-s1',         { opacity:1, duration:0.3, stagger:0.05 }, 0.5);
tl.to('#shell-ring-2', { opacity:0.5, duration:0.3 }, 0.7);
tl.to('.e-s2',         { opacity:1, duration:0.3, stagger:0.04 }, 0.9);
tl.to('#shell-ring-3', { opacity:0.5, duration:0.3 }, 1.1);
tl.to('.e-s3',         { opacity:1, duration:0.3, stagger:0.03 }, 1.3);
tl.to('#empty-slot',   { opacity:1, duration:0.2 }, 1.4);
tl.to('#empty-slot',   { opacity:0.2, duration:0.4, yoyo:true, repeat:3, ease:'sine.inOut' }, 1.6);
tl.to('#headline',     { opacity:1, y:0, duration:0.35, ease:'back.out(1.6)' }, 1.0);

var captionTiming = {{captionTiming}};
var chunks = hfBuildCaptions(captionTiming);
hfAnimateCaptions(tl, chunks, captionTiming);

window.__timelines['{{id}}'] = tl;
</script>
</template>
</body>
</html>
