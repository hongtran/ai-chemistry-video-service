<!doctype html>
<html>
<head><meta charset="UTF-8" /></head>
<body>
<template>
<style>
/* SB-1 */
@import url("https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700;800;900&display=swap");
#root { position:absolute; inset:0; width:{{width}}px; height:{{height}}px; background:{{bg}}; color:{{fg}}; overflow:hidden; }
#eyebrow { position:absolute; top:120px; left:0; right:0; text-align:center; font-family:'Inter',sans-serif; font-size:34px; font-weight:800; letter-spacing:6px; text-transform:uppercase; opacity:.85; color:{{accent}}; }
#headline { position:absolute; top:220px; left:0; right:0; text-align:center; padding:0 80px; font-family:'Anton',sans-serif; font-weight:400; font-size:84px; line-height:1.15; text-transform:uppercase; }
#hero { position:absolute; top:380px; left:0; right:0; bottom:430px; display:flex; align-items:center; justify-content:center; }
#card { position:relative; width:900px; padding:50px 56px; border:3px solid {{accent}}; border-radius:24px; background:rgba(255,255,255,0.05); box-shadow:0 24px 60px rgba(0,0,0,0.35); }
#f-title { font-family:'Inter',sans-serif; font-weight:800; font-size:30px; letter-spacing:2px; text-transform:uppercase; text-align:center; opacity:.6; margin-bottom:30px; }
.frow { padding:22px 4px; border-bottom:1.5px solid rgba(255,255,255,0.10); }
.frow:last-of-type { border-bottom:none; }
.fname { font-family:'Inter',sans-serif; font-weight:800; font-size:26px; letter-spacing:2px; text-transform:uppercase; color:{{accent}}; margin-bottom:12px; }
.feq { font-size:44px; text-align:center; line-height:1; }
.feq .katex-display { margin:0; }
.feq .katex { color:{{fg}}; }
/* Defensive: KaTeX's screen-reader-only MathML tree is normally hidden by
   katex.min.css, but that stylesheet loads async relative to when the
   capture engine clones this composition's template tag into the live DOM, so the hide
   rule can race. Inline the standard visually-hidden clip so it's hidden
   from first paint regardless of stylesheet timing. */
.katex-mathml { position:absolute !important; clip:rect(1px,1px,1px,1px) !important; clip-path:inset(50%) !important; overflow:hidden !important; height:1px !important; width:1px !important; padding:0 !important; border:0 !important; white-space:nowrap !important; }
#legend { margin-top:32px; }
#legend .lead { font-family:'Inter',sans-serif; font-weight:800; font-size:24px; letter-spacing:2px; text-transform:uppercase; opacity:.5; margin-bottom:12px; }
.leg-row { display:flex; align-items:baseline; gap:18px; padding:8px 0; font-family:'Inter',sans-serif; font-size:30px; }
.leg-row .lsym { min-width:72px; font-size:32px; color:{{accent}}; }
.leg-row .lsym .katex { color:{{accent}}; }
.leg-row .ldesc { opacity:.85; }
#caption-zone { position:absolute; bottom:230px; left:0; right:0; padding:0 90px; display:flex; align-items:center; justify-content:center; }
#caption { position:relative; width:100%; height:2.4em; }
.hl { padding:0 .14em; border-radius:10px; background:{{accent}}; color:{{bg}}; }

/* Karaoke caption chunk (built by hfBuildCaptions; one .cw span per word) */
.cap-chunk { position:absolute; width:100%; left:0; top:50%; transform:translateY(-50%); font-family:'Inter',sans-serif; font-weight:900; text-align:center; line-height:1.25; font-size:var(--cap-size,66px); opacity:0; }
.cap-chunk .cw { display:inline-block; white-space:pre; }

#main-clip.vertical   { --cap-size:66px; }
#main-clip.horizontal { --cap-size:44px; }
#main-clip.horizontal #caption-zone { bottom:60px; padding:0 160px; }
#main-clip.horizontal #caption { max-width:1360px; margin:0 auto; }

#main-clip.horizontal #eyebrow  { top:52px; }
#main-clip.horizontal #headline { top:118px; font-size:64px; }
#main-clip.horizontal #hero     { top:246px; bottom:150px; }
#main-clip.horizontal #card     { width:1650px; padding:32px 56px; }
#main-clip.horizontal #f-title  { font-size:24px; margin-bottom:16px; }
/* Stacking 1-3 formulas vertically (the portrait layout) doesn't fit the
   short 1080px-tall horizontal canvas once a formula has a sqrt/fraction —
   lay formulas out side-by-side instead, since horizontal has width to
   spare (1920px) but little height. */
#main-clip.horizontal #f-list   { display:flex; align-items:stretch; }
#main-clip.horizontal .frow     { flex:1 1 0; min-width:0; padding:8px 30px; border-bottom:none; border-right:1.5px solid rgba(255,255,255,0.10); }
#main-clip.horizontal .frow:last-of-type { border-right:none; }
#main-clip.horizontal .fname    { font-size:19px; margin-bottom:8px; }
#main-clip.horizontal .feq      { font-size:32px; }
#main-clip.horizontal #legend   { margin-top:18px; display:flex; flex-wrap:wrap; align-items:baseline; gap:6px 30px; }
#main-clip.horizontal #legend .lead { width:100%; margin-bottom:2px; }
#main-clip.horizontal .leg-row  { padding:2px 0; font-size:22px; gap:8px; }
#main-clip.horizontal .leg-row .lsym { min-width:40px; font-size:22px; }
</style>

<div id="root" data-composition-id="{{id}}" data-width="{{width}}" data-height="{{height}}" data-duration="{{duration}}" data-start="0">
  <section class="clip {{orientation}}" id="main-clip" data-start="0" data-duration="{{duration}}" data-track-index="1">
    <div id="eyebrow">{{eyebrow}}</div>
    <div id="headline">{{headline}}</div>
    <div id="hero">
      <div id="card">
        <div id="f-title">{{title}}</div>
        <div id="f-list"></div>
        <div id="legend"></div>
      </div>
    </div>
    <div id="caption-zone"><div id="caption"></div></div>
  </section>
</div>

<!-- KaTeX CSS inlined (not linked): determinism-rules.md bans render-time
     network fetches for required assets, and this repo's capture runtime
     awaits external <script src> loads but NOT <link rel="stylesheet">
     loads found inside a cloned template tag -- an unawaited stylesheet fetch
     races the first paint/capture, sometimes leaving KaTeX's screen-reader
     MathML tree visibly unhidden. Font files stay on the CDN (absolute
     URLs below); those load via the standard @font-face path the capture
     tool already tracks via document.fonts. -->

function hfSplitMarks(t){ return String(t).replace(/\*\*(.+?)\*\*/g,function(_m,inner){ return inner.split(/\s+/).map(function(w){ return '**'+w+'**'; }).join(' '); }); }
function hfBuildCaptions(cv){ var arr=Array.isArray(cv)?cv:[]; var host=document.getElementById('caption'); return arr.map(function(c){ var d=document.createElement('div'); d.className='cap-chunk'; var ws=Array.isArray(c.words)?c.words:[]; d.innerHTML= ws.length ? ws.map(function(w){ return '<span class="cw">'+hfHighlight(w.text)+' </span>'; }).join('') : hfHighlight(hfSplitMarks(c.text)); host.appendChild(d); return d; }); }
function hfAnimateCaptions(tl,ch,timings){ ch.forEach(function(el,i){ var t=timings[i]; if(!t)return; tl.to(el,{opacity:1,duration:i===0?0.2:0.18},t.start); if(i<ch.length-1){ var nextStart=timings[i+1]?timings[i+1].start:t.end; tl.to(el,{opacity:0,duration:0.12},Math.max(t.start,nextStart-0.12)); }
  var ws=Array.isArray(t.words)?t.words:[]; var spans=el.querySelectorAll('.cw'); ws.forEach(function(w,wi){ var span=spans[wi]; if(!span||span.querySelector('.hl'))return; tl.to(span,{color:'{{capHighlight}}',duration:0.12,ease:'power2.out'},w.start); tl.to(span,{color:'{{fg}}',duration:0.15},Math.max(w.start+0.12,w.end)); }); }); }

// Formula card: render each {name, latex} row and each {sym, desc} legend row.
// KaTeX (loaded above) renders synchronously; throwOnError:false keeps a bad
// formula from blanking the frame — it falls back to the raw source text.
function hfKatex(el, src, display){
  if (typeof katex === 'undefined'){ el.textContent = src; return; }
  try {
    katex.render(String(src), el, { throwOnError:false, displayMode:!!display });
    // KaTeX's own internal rendering techniques -- the screen-reader-only
    // MathML tree clipped to 1x1px, the sqrt's "hide-tail" clipped SVG path,
    // vlist accent stacking (e.g. the bar in \bar{x}) -- rely on intentional
    // overflow/overlap the generic layout inspector doesn't recognize as a
    // mature, visually-verified third-party library's design. Mark the whole
    // rendered subtree rather than chase each internal technique piecemeal.
    var rendered = el.querySelector('.katex');
    if (rendered){ rendered.setAttribute('data-layout-allow-overflow',''); rendered.setAttribute('data-layout-allow-overlap',''); }
  }
  catch(e){ el.textContent = src; }
}
var formulas = {{formulas}}; formulas = Array.isArray(formulas) ? formulas.slice(0,3) : [];
var legend   = {{legend}};   legend   = Array.isArray(legend)   ? legend   : [];

var list = document.getElementById('f-list');
var frows = formulas.map(function(f){
  var name = f && f.name != null ? String(f.name) : '';
  var latex = f && f.latex != null ? String(f.latex) : '';
  var row = document.createElement('div'); row.className='frow';
  if (name){ var nm=document.createElement('div'); nm.className='fname'; nm.textContent=name; row.appendChild(nm); }
  var eq=document.createElement('div'); eq.className='feq'; row.appendChild(eq);
  list.appendChild(row);
  hfKatex(eq, latex, true);
  return row;
});

var legEl = document.getElementById('legend');
if (legend.length){
  var lead=document.createElement('div'); lead.className='lead'; lead.textContent='where'; legEl.appendChild(lead);
  legend.forEach(function(l){
    var r=document.createElement('div'); r.className='leg-row';
    var s=document.createElement('span'); s.className='lsym'; r.appendChild(s);
    var d=document.createElement('span'); d.className='ldesc'; d.textContent = l && l.desc != null ? String(l.desc) : ''; r.appendChild(d);
    legEl.appendChild(r);
    hfKatex(s, l && l.sym != null ? String(l.sym) : '', false);
  });
} else { legEl.style.display='none'; }

gsap.set('#eyebrow',{opacity:0,y:-12});
gsap.set('#headline',{opacity:0,y:16});
gsap.set('#card',{opacity:0,y:26,scale:0.94,transformOrigin:'center'});
gsap.set('#f-title',{opacity:0,y:12});
gsap.set(frows,{opacity:0,x:22});
var legRows = Array.prototype.slice.call(legEl.querySelectorAll('.lead, .leg-row'));
gsap.set(legRows,{opacity:0,y:12});

var tl = gsap.timeline({ paused:true });
tl.to('#eyebrow', { opacity:1, y:0, duration:0.3, ease:'power2.out' }, 0.1);
tl.to('#headline',{ opacity:1, y:0, duration:0.4, ease:'power3.out' }, 0.2);
tl.to('#card',    { opacity:1, y:0, scale:1, duration:0.5, ease:'power3.out' }, 0.3);
tl.to('#f-title', { opacity:1, y:0, duration:0.3, ease:'power2.out' }, 0.45);
tl.to(frows,      { opacity:1, x:0, duration:0.35, ease:'power2.out', stagger:0.14 }, 0.6);
tl.to(legRows,    { opacity:1, y:0, duration:0.3, ease:'power2.out', stagger:0.06 }, '>-0.1');

var captionTiming = {{captionTiming}};
var chunks = hfBuildCaptions(captionTiming);
hfAnimateCaptions(tl, chunks, captionTiming);

window.__timelines['{{id}}'] = tl;
</script>
</template>
</body>
</html>
