<!doctype html>
<html>
<head><meta charset="UTF-8" /></head>
<body>
<template>
<style>
/* SB-1 */
@import url("https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700;800;900&display=swap");
#root { position:absolute; inset:0; width:{{width}}px; height:{{height}}px; background:{{bg}}; color:{{fg}}; overflow:hidden; }
/* Full-bleed conclusion image (generated from imagePrompt); hidden on the
   solid-bg fallback when no real picture has been generated yet. Centered text
   needs an even, full-frame scrim for legibility over any image. */
#photo { position:absolute; inset:0; background-image:url("{{image}}"); background-size:cover; background-position:center; will-change:transform, filter; }
#scrim { position:absolute; inset:0; background:linear-gradient(to bottom, rgba(0,0,0,0.58) 0%, rgba(0,0,0,0.68) 55%, rgba(0,0,0,0.78) 100%); }
#eyebrow { position:absolute; top:120px; left:0; right:0; text-align:center; font-family:'Inter',sans-serif; font-size:34px; font-weight:800; letter-spacing:6px; text-transform:uppercase; opacity:.85; }
#caption-zone { position:absolute; bottom:230px; left:0; right:0; padding:0 90px; display:flex; align-items:center; justify-content:center; }
#caption { position:relative; width:100%; height:2.4em; }
.hl { padding:0 .14em; border-radius:10px; background:{{accent}}; color:{{bg}}; }
/* CTA overrides — headline centered within #hero zone */
#hero { position:absolute; top:0; left:80px; right:80px; bottom:420px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:36px; overflow:hidden; }
#headline { width:100%; max-width:920px; min-width:0; font-family:'Anton',sans-serif; font-weight:400; font-size:132px; line-height:1.15; text-transform:uppercase; text-align:center; overflow-wrap:break-word; text-shadow:0 3px 28px rgba(0,0,0,0.55); }
#subheadline { width:100%; max-width:860px; min-width:0; font-family:'Inter',sans-serif; font-size:40px; font-weight:800; line-height:1.2; text-align:center; opacity:.9; overflow-wrap:break-word; text-shadow:0 2px 16px rgba(0,0,0,0.5); }

/* Karaoke caption chunk (built by hfBuildCaptions; one .cw span per word) */
.cap-chunk { position:absolute; width:100%; left:0; top:50%; transform:translateY(-50%); font-family:'Inter',sans-serif; font-weight:900; text-align:center; line-height:1.25; font-size:var(--cap-size,66px); opacity:0; text-shadow:0 2px 16px rgba(0,0,0,0.6); }
.cap-chunk .cw { display:inline-block; white-space:pre; }

#main-clip.vertical   { --cap-size:66px; }
#main-clip.horizontal { --cap-size:44px; }
#main-clip.horizontal #caption-zone { bottom:60px; padding:0 160px; }
#main-clip.horizontal #caption { max-width:1360px; margin:0 auto; }

#main-clip.horizontal #hero        { bottom:210px; left:160px; right:160px; }
#main-clip.horizontal #headline    { font-size:118px; max-width:1500px; }
#main-clip.horizontal #subheadline { max-width:1200px; }
</style>

<div id="root" data-composition-id="{{id}}" data-width="{{width}}" data-height="{{height}}" data-duration="{{duration}}" data-start="0">
  <section class="clip {{orientation}}" id="main-clip" data-start="0" data-duration="{{duration}}" data-track-index="1">
    <div id="photo"></div>
    <div id="scrim"></div>
    <div id="hero">
      <div id="headline">{{headline}}</div>
      <div id="subheadline">{{subheadline}}</div>
    </div>
    <div id="caption-zone"><div id="caption"></div></div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script>
window.__timelines = window.__timelines || {};
/* SB-2 */
function hfEsc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
function hfHighlight(t){ return hfEsc(t).replace(/\*\*(.+?)\*\*/g,'<span class="hl">$1<\/span>'); }
['eyebrow','headline'].forEach(function(id){ var el=document.getElementById(id); if(!el)return; var t=el.textContent.trim(); if(!t){el.style.display='none';return;} el.innerHTML=hfHighlight(t); });
function hfSplitMarks(t){ return String(t).replace(/\*\*(.+?)\*\*/g,function(_m,inner){ return inner.split(/\s+/).map(function(w){ return '**'+w+'**'; }).join(' '); }); }
function hfBuildCaptions(cv){ var arr=Array.isArray(cv)?cv:[]; var host=document.getElementById('caption'); return arr.map(function(c){ var d=document.createElement('div'); d.className='cap-chunk'; var ws=Array.isArray(c.words)?c.words:[]; d.innerHTML= ws.length ? ws.map(function(w){ return '<span class="cw">'+hfHighlight(w.text)+' </span>'; }).join('') : hfHighlight(hfSplitMarks(c.text)); host.appendChild(d); return d; }); }
function hfAnimateCaptions(tl,ch,timings){ ch.forEach(function(el,i){ var t=timings[i]; if(!t)return; if(i<ch.length-1){ var nextStart=timings[i+1]?timings[i+1].start:t.end; var gap=Math.max(0.02,nextStart-t.start); var fadeOutDur=Math.min(0.12,gap); var fadeInDur=Math.min(i===0?0.2:0.18,Math.max(0.01,gap-fadeOutDur)); tl.to(el,{opacity:1,duration:fadeInDur},t.start); tl.to(el,{opacity:0,duration:fadeOutDur},nextStart-fadeOutDur); } else { tl.to(el,{opacity:1,duration:i===0?0.2:0.18},t.start); }
  // Karaoke: only the word being spoken holds capHighlight; every other word
  // keeps the caption color. Emphasis pills (.hl) opt out.
  var ws=Array.isArray(t.words)?t.words:[]; var spans=el.querySelectorAll('.cw'); ws.forEach(function(w,wi){ var span=spans[wi]; if(!span||span.querySelector('.hl'))return; tl.to(span,{color:'{{capHighlight}}',duration:0.12,ease:'power2.out'},w.start); tl.to(span,{color:'#FFFFFF',duration:0.15},Math.max(w.start+0.12,w.end)); }); }); }

// Show the photo + scrim only for a REAL generated image; otherwise fall back
// to the solid {{bg}} so the cta still reads as a clean centered text card.
var img = '{{image}}';
var hasImg = /^data:image\/(png|jpe?g|webp)/i.test(img) || /^https?:/i.test(img);
var photoEl = document.getElementById('photo');
var scrimEl = document.getElementById('scrim');
if (!hasImg) { photoEl.style.display = 'none'; scrimEl.style.display = 'none'; }

// Shared image-motion engine (see also photo/cover/photo-split). Animates the
// picture element `sel` from an authored `anim` spec; defaults to a gentle
// Ken-Burns push so scenes with no `anim` look the same as before. Measures the
// element so pans stay within overscan for both full-bleed and half-panel images.
function hfAnimatePhoto(tl, sel, anim, dur){
  var el = document.querySelector(sel); if(!el) return;
  var A = (anim && typeof anim==='object' && !Array.isArray(anim)) ? anim : {};
  var KI={subtle:0.6,medium:1.0,bold:1.5}, k=KI[A.intensity]!=null?KI[A.intensity]:1.0;
  var ORG={center:'50% 50%',top:'50% 22%',bottom:'50% 78%',left:'22% 50%',right:'78% 50%'}, origin=ORG[A.focus]||'50% 50%';
  var w=el.clientWidth||parseFloat('{{width}}')||1080, h=el.clientHeight||parseFloat('{{height}}')||1920;
  var PAN=1.16, dx=((PAN-1)/2)*w*0.82*Math.min(k,1.3), dy=((PAN-1)/2)*h*0.82*Math.min(k,1.3);
  var P={
    'ken-burns-in':function(){ gsap.set(el,{scale:1,x:0,y:0,transformOrigin:origin}); tl.to(el,{scale:1+0.10*k,duration:dur,ease:'none'},0); },
    'ken-burns-out':function(){ gsap.set(el,{scale:1+0.12*k,x:0,y:0,transformOrigin:origin}); tl.to(el,{scale:1,duration:dur,ease:'none'},0); },
    'pan-left':function(){ gsap.set(el,{scale:PAN,x:dx,y:0,transformOrigin:'50% 50%'}); tl.to(el,{x:-dx,duration:dur,ease:'sine.inOut'},0); },
    'pan-right':function(){ gsap.set(el,{scale:PAN,x:-dx,y:0,transformOrigin:'50% 50%'}); tl.to(el,{x:dx,duration:dur,ease:'sine.inOut'},0); },
    'pan-up':function(){ gsap.set(el,{scale:PAN,x:0,y:dy,transformOrigin:'50% 50%'}); tl.to(el,{y:-dy,duration:dur,ease:'sine.inOut'},0); },
    'pan-down':function(){ gsap.set(el,{scale:PAN,x:0,y:-dy,transformOrigin:'50% 50%'}); tl.to(el,{y:dy,duration:dur,ease:'sine.inOut'},0); },
    'push-diagonal':function(){ gsap.set(el,{scale:1,x:dx*0.4,y:dy*0.3,transformOrigin:origin}); tl.to(el,{scale:1+0.10*k,x:-dx*0.4,y:-dy*0.3,duration:dur,ease:'none'},0); },
    'focus-pull':function(){ var hd=Math.min(1.4,dur*0.45); gsap.set(el,{scale:1.06,filter:'blur('+(14*k)+'px)',transformOrigin:origin}); tl.to(el,{scale:1.02,filter:'blur(0px)',duration:hd,ease:'power2.out'},0); tl.to(el,{scale:1.06,duration:Math.max(0.1,dur-hd),ease:'none'},hd); },
    'breathe':function(){ gsap.set(el,{scale:1,x:0,y:0,transformOrigin:origin}); tl.to(el,{scale:1+0.045*k,duration:dur/2,ease:'sine.inOut',yoyo:true,repeat:1},0); }
  };
  (P[A.preset]||P['ken-burns-in'])();
  if(A.overlay && A.overlay!=='none'){
    var fx=document.createElement('div'); fx.style.cssText='position:absolute;inset:0;pointer-events:none;opacity:0;';
    if(el.parentNode) el.parentNode.insertBefore(fx, el.nextSibling);
    if(A.overlay==='sweep'){ fx.style.background='linear-gradient(115deg, rgba(255,255,255,0) 38%, rgba(255,255,255,0.28) 50%, rgba(255,255,255,0) 62%)'; fx.style.mixBlendMode='screen'; tl.set(fx,{opacity:1}); tl.fromTo(fx,{xPercent:-120},{xPercent:120,duration:Math.min(1.1,dur*0.5),ease:'power2.inOut'},dur*0.18); tl.to(fx,{opacity:0,duration:0.3},dur*0.18+Math.min(1.1,dur*0.5)); }
    else if(A.overlay==='vignette'){ fx.style.background='radial-gradient(120% 120% at 50% 50%, rgba(0,0,0,0) 55%, rgba(0,0,0,0.55) 100%)'; tl.fromTo(fx,{opacity:0.35},{opacity:0.7,duration:dur/2,ease:'sine.inOut',yoyo:true,repeat:1},0); }
    else if(A.overlay==='grain'){ fx.style.backgroundImage='url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxNjAiIGhlaWdodD0iMTYwIj48ZmlsdGVyIGlkPSJuIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iMC44IiBudW1PY3RhdmVzPSIyIiBzdGl0Y2hUaWxlcz0ic3RpdGNoIi8+PC9maWx0ZXI+PHJlY3Qgd2lkdGg9IjE2MCIgaGVpZ2h0PSIxNjAiIGZpbHRlcj0idXJsKCNuKSIgb3BhY2l0eT0iMC42Ii8+PC9zdmc+")'; fx.style.backgroundSize='280px 280px'; fx.style.mixBlendMode='overlay'; tl.set(fx,{opacity:0.10}); tl.fromTo(fx,{backgroundPosition:'0px 0px'},{backgroundPosition:'160px 90px',duration:dur,ease:'none'},0); }
    else if(A.overlay==='glow'){ fx.style.boxShadow='inset 0 0 180px 40px {{accent}}55'; tl.fromTo(fx,{opacity:0},{opacity:0.9,duration:dur/2,ease:'sine.inOut',yoyo:true,repeat:1},0.2); }
  }
}

var dur = parseFloat('{{duration}}') || 5;
var A = {{anim}} || {};
gsap.set('#scrim', { opacity:0 });
gsap.set('#headline',   { opacity:0, y:18 });
gsap.set('#subheadline',{ opacity:0, y:16 });

var tl = gsap.timeline({ paused:true });
if (hasImg) {
  hfAnimatePhoto(tl, '#photo', A, dur);   // preset motion library (anim)
  tl.to('#scrim', { opacity:1, duration:0.5 }, 0);
}
tl.to('#headline',    { opacity:1, y:0, duration:0.35, ease:'power3.out' }, 0.15);
tl.to('#subheadline', { opacity:1, y:0, duration:0.5,  ease:'power3.out' }, 0.65);

var captionTiming = {{captionTiming}};
var chunks = hfBuildCaptions(captionTiming);
hfAnimateCaptions(tl, chunks, captionTiming);

window.__timelines['{{id}}'] = tl;
</script>
</template>
</body>
</html>
