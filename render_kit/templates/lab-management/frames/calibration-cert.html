<!doctype html>
<html>
<head><meta charset="UTF-8" /></head>
<body>
<template>
<style>
@import url("https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=Inter:wght@400;600;700;800;900&display=swap");
#root { position:absolute; inset:0; width:{{width}}px; height:{{height}}px; background:{{bg}}; color:{{fg}}; overflow:hidden; }
#eyebrow { position:absolute; top:120px; left:0; right:0; text-align:center; font-family:'Inter',sans-serif; font-size:32px; font-weight:800; letter-spacing:6px; text-transform:uppercase; opacity:.7; color:{{accent}}; }
#hero { position:absolute; top:280px; left:0; right:0; bottom:420px; display:flex; align-items:center; justify-content:center; }
#cert { position:relative; width:860px; padding:56px 60px; border:3px solid {{accent}}; border-radius:20px; background:rgba(255,255,255,0.55); box-shadow:0 24px 60px rgba(0,0,0,0.12); }
#cert::before { content:''; position:absolute; inset:14px; border:1.5px solid {{accent}}; border-radius:12px; opacity:.5; pointer-events:none; }
#cert-title { font-family:'Playfair Display',serif; font-weight:800; font-size:56px; line-height:1.05; text-align:center; margin-bottom:8px; }
#cert-no { font-family:'Inter',sans-serif; font-weight:700; font-size:26px; letter-spacing:2px; text-align:center; opacity:.55; text-transform:uppercase; margin-bottom:34px; }
.krow { display:flex; justify-content:space-between; align-items:baseline; gap:24px; padding:18px 4px; border-bottom:1.5px solid rgba(0,0,0,0.10); }
.krow .k { font-family:'Inter',sans-serif; font-weight:800; font-size:28px; letter-spacing:1px; text-transform:uppercase; opacity:.55; }
.krow .v { font-family:'Inter',sans-serif; font-weight:800; font-size:36px; text-align:right; }
.krow.hero-row .v { color:{{accent}}; }
/* The last row (traceable-to) reserves space on the right so a long value
   wraps clear of the corner seal instead of sliding under it. */
#row-trace { padding-right:150px; }
#seal { position:absolute; right:-22px; bottom:-22px; width:128px; height:128px; border-radius:50%; background:{{accent}}; color:#FFFFFF; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; font-family:'Inter',sans-serif; box-shadow:0 12px 30px rgba(0,0,0,0.2); }
#seal .big { font-family:'Playfair Display',serif; font-weight:800; font-size:38px; line-height:1; }
#seal .small { font-weight:800; font-size:14px; letter-spacing:2px; text-transform:uppercase; margin-top:5px; opacity:.9; }
#caption-zone { position:absolute; bottom:230px; left:0; right:0; padding:0 90px; display:flex; align-items:center; justify-content:center; }
#caption { position:relative; width:100%; height:2.4em; }
.hl { padding:0 .14em; border-radius:10px; background:{{accent}}; color:#FFFFFF; }

/* Karaoke caption chunk (built by hfBuildCaptions; one .cw span per word) */
.cap-chunk { position:absolute; width:100%; left:0; top:50%; transform:translateY(-50%); font-family:'Inter',sans-serif; font-weight:900; text-align:center; line-height:1.25; font-size:var(--cap-size,66px); opacity:0; }
.cap-chunk .cw { display:inline-block; white-space:pre; }

#main-clip.vertical   { --cap-size:66px; }
#main-clip.horizontal { --cap-size:44px; }
#main-clip.horizontal #caption-zone { bottom:60px; padding:0 160px; }
#main-clip.horizontal #caption { max-width:1360px; margin:0 auto; }

#main-clip.horizontal #eyebrow { top:64px; }
#main-clip.horizontal #hero    { top:150px; bottom:200px; }
#main-clip.horizontal #cert    { width:1180px; padding:44px 68px; }
#main-clip.horizontal .krow    { padding:14px 4px; }
</style>

<div id="root" data-composition-id="{{id}}" data-width="{{width}}" data-height="{{height}}" data-duration="{{duration}}" data-start="0">
  <section class="clip {{orientation}}" id="main-clip" data-start="0" data-duration="{{duration}}" data-track-index="1">
    <div id="eyebrow">{{eyebrow}}</div>
    <div id="hero">
      <div id="cert">
        <div id="cert-title">{{headline}}</div>
        <div id="cert-no">{{certNo}}</div>
        <div class="krow"><span class="k">Instrument</span><span class="v" id="v-inst">{{instrument}}</span></div>
        <div class="krow"><span class="k">Calibrated</span><span class="v" id="v-cal">{{calDate}}</span></div>
        <div class="krow"><span class="k">Due</span><span class="v" id="v-due">{{dueDate}}</span></div>
        <div class="krow hero-row"><span class="k">Uncertainty</span><span class="v" id="v-unc">{{uncertainty}}</span></div>
        <div class="krow" id="row-trace"><span class="k">Traceable to</span><span class="v" id="v-trace">{{traceableTo}}</span></div>
        <div id="seal"><div class="big">SI</div><div class="small">Traceable</div></div>
      </div>
    </div>
    <div id="caption-zone"><div id="caption"></div></div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script>
window.__timelines = window.__timelines || {};
function hfEsc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
function hfHighlight(t){ return hfEsc(t).replace(/\*\*(.+?)\*\*/g,'<span class="hl">$1<\/span>'); }
['eyebrow','cert-title'].forEach(function(id){ var el=document.getElementById(id); if(!el)return; var t=el.textContent.trim(); if(!t){el.style.display='none';return;} el.innerHTML=hfHighlight(t); });
if (!document.getElementById('cert-no').textContent.trim()) document.getElementById('cert-no').style.display='none';
function hfSplitMarks(t){ return String(t).replace(/\*\*(.+?)\*\*/g,function(_m,inner){ return inner.split(/\s+/).map(function(w){ return '**'+w+'**'; }).join(' '); }); }
function hfBuildCaptions(cv){ var arr=Array.isArray(cv)?cv:[]; var host=document.getElementById('caption'); return arr.map(function(c){ var d=document.createElement('div'); d.className='cap-chunk'; var ws=Array.isArray(c.words)?c.words:[]; d.innerHTML= ws.length ? ws.map(function(w){ return '<span class="cw">'+hfHighlight(w.text)+' </span>'; }).join('') : hfHighlight(hfSplitMarks(c.text)); host.appendChild(d); return d; }); }
function hfAnimateCaptions(tl,ch,timings){ ch.forEach(function(el,i){ var t=timings[i]; if(!t)return; if(i<ch.length-1){ var nextStart=timings[i+1]?timings[i+1].start:t.end; var gap=Math.max(0.02,nextStart-t.start); var fadeOutDur=Math.min(0.12,gap); var fadeInDur=Math.min(i===0?0.2:0.18,Math.max(0.01,gap-fadeOutDur)); tl.to(el,{opacity:1,duration:fadeInDur},t.start); tl.to(el,{opacity:0,duration:fadeOutDur},nextStart-fadeOutDur); } else { tl.to(el,{opacity:1,duration:i===0?0.2:0.18},t.start); }
  var ws=Array.isArray(t.words)?t.words:[]; var spans=el.querySelectorAll('.cw'); ws.forEach(function(w,wi){ var span=spans[wi]; if(!span||span.querySelector('.hl'))return; tl.to(span,{color:'{{capHighlight}}',duration:0.12,ease:'power2.out'},w.start); tl.to(span,{color:'{{fg}}',duration:0.15},Math.max(w.start+0.12,w.end)); }); }); }

var rows = Array.prototype.slice.call(document.querySelectorAll('.krow'));
gsap.set('#cert', { opacity:0, y:26, scale:0.94, transformOrigin:'center' });
gsap.set(['#cert-title','#cert-no'], { opacity:0, y:14 });
gsap.set(rows, { opacity:0, x:24 });
gsap.set('#seal', { opacity:0, scale:0, rotate:-30, transformOrigin:'center' });
gsap.set('#eyebrow', { opacity:0, y:-12 });

var tl = gsap.timeline({ paused:true });
tl.to('#eyebrow', { opacity:1, y:0, duration:0.3, ease:'power2.out' }, 0.1);
tl.to('#cert', { opacity:1, y:0, scale:1, duration:0.5, ease:'power3.out' }, 0.2);
tl.to(['#cert-title','#cert-no'], { opacity:1, y:0, duration:0.35, ease:'power3.out', stagger:0.1 }, 0.35);
tl.to(rows, { opacity:1, x:0, duration:0.3, ease:'power2.out', stagger:0.1 }, 0.6);
tl.to('#seal', { opacity:1, scale:1, rotate:-12, duration:0.45, ease:'back.out(1.8)' }, 1.2);

var captionTiming = {{captionTiming}};
var chunks = hfBuildCaptions(captionTiming);
hfAnimateCaptions(tl, chunks, captionTiming);

window.__timelines['{{id}}'] = tl;
</script>
</template>
</body>
</html>
